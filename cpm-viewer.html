<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CPM Viewer — Construction Project Management</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600;700&family=Barlow+Condensed:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
<style>
:root{
  --bg:#0f0f0f;--surface:#1a1a1a;--card2:#222;--border:#2e2e2e;--border2:#3a3a3a;
  --amber:#f59e0b;--amber2:#c9a227;--green:#4ade80;--red:#f87171;--blue:#60a5fa;--purple:#a78bfa;
  --text:#f1f1f1;--text2:#c4c4c4;--text3:#737373;--text4:#4a4a4a;
  --radius:10px;--radius2:8px;--mono:'IBM Plex Mono',monospace;--cond:'Barlow Condensed',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;min-height:100vh}

/* ── LOGIN ── */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:48px 40px;max-width:420px;width:100%;text-align:center}
.login-logo{font-family:var(--cond);font-size:30px;font-weight:700;letter-spacing:1px;color:var(--amber);margin-bottom:4px}
.login-sub{font-size:13px;color:var(--text3);margin-bottom:28px;letter-spacing:.3px}
.login-label{display:block;text-align:left;font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:6px}
.login-input{width:100%;padding:12px 14px;background:var(--card2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;font-family:'Barlow',sans-serif;outline:none;margin-bottom:0;transition:border .2s}
.login-input:focus{border-color:var(--amber)}
.pw-wrap{position:relative;margin-bottom:16px}
.pw-wrap .login-input{padding-right:44px}
.pw-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text3);font-size:16px;padding:4px;line-height:1}
.pw-toggle:hover{color:var(--amber)}
.login-btn{width:100%;padding:13px;background:var(--amber);color:#1a1a1a;font-weight:700;border:none;border-radius:8px;cursor:pointer;font-family:var(--cond);letter-spacing:.5px;font-size:15px;transition:opacity .2s}
.login-btn:hover{opacity:.9}
.login-err{font-size:12px;color:var(--red);min-height:18px;margin-bottom:10px}
.login-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.2);border-radius:20px;padding:4px 14px;font-size:11px;color:var(--amber);margin-bottom:28px;letter-spacing:.3px;font-weight:600}

/* ── APP SHELL ── */
#app-screen{display:none}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.topbar-brand{font-family:var(--cond);font-size:16px;font-weight:700;letter-spacing:.5px;color:var(--amber)}
.topbar-meta{font-size:11px;color:var(--text3)}
.topbar-right{display:flex;align-items:center;gap:12px}
.snap-block{display:flex;flex-direction:column;align-items:flex-end;gap:2px}
.snap-date{font-size:12px;font-weight:700;font-family:var(--mono);color:var(--amber)}
.snap-label{font-size:10px;font-weight:700;letter-spacing:.4px;text-transform:uppercase}
.snap-label.fresh{color:#b07800}
.snap-label.stale{color:var(--red)}
.ro-badge{background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.25);border-radius:12px;padding:3px 10px;font-size:11px;font-weight:600;color:var(--amber)}
.lock-btn{background:var(--card2);border:1px solid var(--border);border-radius:6px;padding:5px 12px;font-size:12px;color:var(--text3);cursor:pointer;font-family:'Barlow',sans-serif;transition:all .2s}
.lock-btn:hover{color:var(--text);border-color:var(--border2)}

/* ── PROJECT DROPDOWN ── */
.proj-selector-bar{padding:10px 24px;border-bottom:1px solid var(--border);background:var(--surface);display:flex;align-items:center;gap:12px}
.proj-dropdown-wrap{position:relative}
.proj-dropdown-btn{display:flex;align-items:center;gap:10px;padding:8px 14px;background:var(--card2);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-size:13px;font-weight:600;font-family:'Barlow',sans-serif;cursor:pointer;min-width:240px;max-width:400px;transition:border-color .2s}
.proj-dropdown-btn:hover{border-color:var(--amber)}
.proj-dropdown-label{flex:1;text-align:left;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.proj-dropdown-arrow{color:var(--text3);font-size:11px;flex-shrink:0;transition:transform .2s}
.proj-dropdown-btn.open .proj-dropdown-arrow{transform:rotate(180deg)}
.proj-dropdown-menu{display:none;position:absolute;top:calc(100% + 6px);left:0;min-width:340px;background:var(--surface);border:1px solid var(--border2);border-radius:10px;overflow:hidden;z-index:100;box-shadow:0 8px 32px rgba(0,0,0,.4)}
.proj-dropdown-menu.open{display:block}
.proj-dropdown-item{display:flex;align-items:center;padding:12px 14px;cursor:pointer;transition:background .15s;border-bottom:1px solid var(--border);gap:10px}
.proj-dropdown-item:last-child{border-bottom:none}
.proj-dropdown-item:hover{background:var(--card2)}
.proj-dropdown-item.active{background:rgba(245,158,11,.08)}
.proj-item-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.proj-item-dot.active{background:var(--green)}
.proj-item-dot.on_hold{background:var(--amber)}
.proj-item-dot.completed{background:var(--blue)}
.proj-item-name{font-size:13px;font-weight:600;color:var(--text);flex:1}
.proj-item-company{font-size:11px;color:var(--text3)}
.proj-item-report{padding:4px 10px;background:rgba(201,162,39,.1);border:1px solid rgba(201,162,39,.3);border-radius:12px;color:var(--amber2);font-size:11px;font-weight:600;cursor:pointer;font-family:'Barlow',sans-serif;white-space:nowrap;transition:all .2s;flex-shrink:0}
.proj-item-report:hover{background:rgba(201,162,39,.2)}

/* ── TABS ── */
.tabs{display:flex;gap:0;padding:0 24px;border-bottom:1px solid var(--border);background:var(--surface);overflow-x:auto}
.tab-btn{padding:12px 16px;font-size:11px;font-weight:700;font-family:var(--cond);letter-spacing:.6px;text-transform:uppercase;color:var(--text3);background:none;border:none;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap;flex-shrink:0}
.tab-btn.active{color:var(--amber);border-bottom-color:var(--amber)}
.tab-btn:hover:not(.active){color:var(--text2)}
.tab-pane{display:none;padding:20px 24px;overflow-y:auto;max-height:calc(100vh - 155px)}
.tab-pane.active{display:block}

/* ── KPI GRID ── */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:20px}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;border-left:3px solid var(--border)}
.kpi.green{border-left-color:var(--green)}.kpi.amber{border-left-color:var(--amber)}
.kpi.blue{border-left-color:var(--blue)}.kpi.purple{border-left-color:var(--purple)}
.kpi.red{border-left-color:var(--red)}
.kpi-label{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:6px}
.kpi-val{font-size:20px;font-weight:700;color:var(--text);font-family:var(--mono);line-height:1.2}
.kpi-sub{font-size:11px;color:var(--text3);margin-top:3px}

/* ── CARDS ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;margin-bottom:14px}
.card-title{font-family:var(--cond);font-size:11px;font-weight:700;letter-spacing:.9px;text-transform:uppercase;color:var(--amber2);margin-bottom:12px}

/* ── PHASE PROGRESS ── */
.phase-row{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.phase-name{font-size:12px;font-weight:600;color:var(--text2);width:200px;flex-shrink:0;line-height:1.3}
.phase-bar-wrap{flex:1;background:var(--card2);border-radius:4px;height:7px;overflow:hidden;min-width:60px}
.phase-bar{height:100%;border-radius:4px;transition:width .5s}
.phase-bar.complete{background:var(--green)}
.phase-bar.partial{background:var(--amber)}
.phase-bar.empty{background:var(--border2)}
.phase-pct{font-size:11px;font-family:var(--mono);color:var(--text3);width:36px;text-align:right;flex-shrink:0}

/* ── STATUS BADGES ── */
.status-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;letter-spacing:.3px}
.status-badge.complete{background:rgba(74,222,128,.12);color:var(--green)}
.status-badge.in-progress{background:rgba(245,158,11,.12);color:var(--amber)}
.status-badge.pending{background:rgba(115,115,115,.1);color:var(--text3)}
.status-badge.blocked{background:rgba(248,113,113,.12);color:var(--red)}

/* ── PHASE SECTION HEADERS (Phases tab) ── */
.phase-section{margin-bottom:20px}
.phase-section-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:linear-gradient(90deg,rgba(201,162,39,.1),rgba(201,162,39,.03));border-left:3px solid var(--amber2);border-radius:0 6px 6px 0;margin-bottom:10px}
.phase-section-title{font-family:var(--cond);font-size:13px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--amber2)}
.phase-section-meta{font-size:11px;color:var(--text3);font-family:var(--mono)}
.phase-progress-mini{height:4px;background:var(--card2);border-radius:2px;overflow:hidden;margin-top:6px}
.phase-progress-mini-fill{height:100%;border-radius:2px}

/* ── TABLES ── */
.data-table{width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed}
.data-table th{background:rgba(255,255,255,.03);color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.6px;font-size:10px;padding:8px 12px;text-align:left;border-bottom:1px solid var(--border2)}
.data-table td{padding:9px 12px;border-bottom:1px solid var(--border);color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.data-table tr:last-child td{border-bottom:none}
.data-table tr:hover td{background:rgba(255,255,255,.018)}
.pos{color:var(--green)}.neg{color:var(--red)}

/* ── LEDGER ── */
.ledger-debit{color:var(--red)}.ledger-credit{color:var(--green)}
.ledger-phase-tag{display:inline-block;padding:2px 7px;border-radius:6px;font-size:10px;background:rgba(245,158,11,.1);color:var(--amber2);font-weight:600;white-space:nowrap}

/* ── INVESTORS ── */
.inv-row{display:grid;grid-template-columns:1fr 120px 80px 80px;gap:12px;align-items:center;padding:11px 0;border-bottom:1px solid var(--border)}
.inv-row:last-child{border-bottom:none}
.inv-name{font-size:13px;font-weight:600;color:var(--text)}
.inv-amt{font-family:var(--mono);font-size:12px;color:var(--text2)}
.inv-pct{font-family:var(--mono);font-size:12px;color:var(--amber)}

/* ── REPORT MODAL ── */
.report-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:200}
.report-modal{background:var(--surface);border:1px solid var(--border2);border-radius:14px;width:420px;max-width:94vw;padding:28px 28px 24px}
.report-modal h3{font-family:var(--cond);font-size:18px;font-weight:700;color:var(--text);letter-spacing:.3px;margin-bottom:6px}
.report-modal-meta{font-size:12px;color:var(--text3);margin-bottom:20px;line-height:1.6}
.report-modal-actions{display:flex;flex-direction:column;gap:10px;margin-bottom:20px}
.report-action-btn{display:flex;align-items:center;gap:12px;padding:13px 16px;border-radius:10px;border:1px solid var(--border);background:var(--card2);cursor:pointer;transition:all .2s;text-align:left;font-family:'Barlow',sans-serif}
.report-action-btn:hover{border-color:var(--amber);background:rgba(201,162,39,.06)}
.report-action-icon{font-size:22px;width:32px;text-align:center;flex-shrink:0}
.report-action-label{font-size:14px;font-weight:600;color:var(--text)}
.report-action-sub{font-size:11px;color:var(--text3);margin-top:2px}
.report-modal-cancel{width:100%;padding:9px;background:transparent;border:1px solid var(--border);border-radius:8px;color:var(--text3);font-size:13px;cursor:pointer;font-family:'Barlow',sans-serif;transition:all .2s}
.report-modal-cancel:hover{border-color:var(--text3);color:var(--text)}
.report-loading{text-align:center;padding:20px 0;font-size:13px;color:var(--text3)}

/* ── FOOTER ── */
.viewer-footer{padding:14px 24px;border-top:1px solid var(--border);text-align:center;font-size:11px;color:var(--text4)}

/* ── RESPONSIVE — iPad + Phone ── */
@media(max-width:900px){
  .proj-dropdown-btn{min-width:220px}
  .inv-row{grid-template-columns:1fr 100px 70px 70px}
}
@media(max-width:640px){
  .topbar{padding:0 14px}
  .topbar-meta{display:none}
  .proj-selector-bar{padding:8px 14px}
  .proj-dropdown-btn{min-width:180px;font-size:12px}
  .proj-dropdown-menu{min-width:260px}
  .tabs{padding:0 14px}
  .tab-btn{padding:10px 10px;font-size:10px;letter-spacing:.3px}
  .tab-pane{padding:14px}
  .kpi-grid{grid-template-columns:1fr 1fr;gap:10px}
  .kpi-val{font-size:17px}
  .phase-name{width:130px;font-size:11px}
  .inv-row{grid-template-columns:1fr 90px 60px}
  .inv-row > *:last-child{display:none}
  .data-table{font-size:11px}
  .data-table td,.data-table th{padding:7px 8px}
}
@media(max-width:400px){
  .login-card{padding:32px 20px}
  .kpi-grid{grid-template-columns:1fr}
  .phase-name{width:100px}
}
/* ── GANTT ── */
.v-gantt-summary{display:flex;gap:12px;align-items:center;flex-wrap:wrap;padding:12px 0 16px}
.v-gstat{display:flex;flex-direction:column;gap:1px}
.v-gstat-val{font-size:16px;font-family:var(--mono);font-weight:600}
.v-gstat-lbl{font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--text3)}
.v-gstat-div{width:1px;height:36px;background:var(--border2);margin:0 4px}
.v-gantt-outer{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.v-gantt-scroll{overflow-x:auto}
.v-gantt-inner{min-width:700px}
.v-ghdr{display:flex;align-items:center;background:var(--card2);border-bottom:1px solid var(--border2)}
.v-gcol-label{width:190px;min-width:190px;padding:6px 14px;font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--text3);border-right:1px solid var(--border)}
.v-gcol-bars{flex:1;display:flex;position:relative;border-right:1px solid var(--border)}
.v-gmonth{flex:1;text-align:center;padding:5px 0;font-size:10px;font-weight:600;color:var(--text3);border-left:1px solid var(--border);letter-spacing:.3px}
.v-gcol-var{width:72px;min-width:72px;padding:6px 8px;font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--text3);text-align:center}
.v-gphase{display:flex;align-items:center;min-height:38px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s}
.v-gphase:hover{background:rgba(255,255,255,.03)}
.v-gphase.open{background:rgba(255,255,255,.02)}
.v-gphase-lbl{width:190px;min-width:190px;padding:8px 14px;border-right:1px solid var(--border);display:flex;align-items:center;gap:7px}
.v-gdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.v-gphase-name{font-size:12px;font-weight:600;font-family:var(--cond);letter-spacing:.3px;color:var(--text);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.v-gchev{font-size:10px;color:var(--text3);transition:transform .15s;flex-shrink:0}
.v-gchev.open{transform:rotate(90deg)}
.v-gbars{flex:1;position:relative;height:38px;border-right:1px solid var(--border)}
.v-gbar-planned{position:absolute;height:10px;top:50%;margin-top:-5px;border-radius:3px;background:rgba(96,165,250,.2);border:1px solid rgba(96,165,250,.4);z-index:1}
.v-gbar-actual{position:absolute;height:14px;top:50%;margin-top:-7px;border-radius:3px;z-index:2}
.v-gbar-actual.complete{background:var(--green)}
.v-gbar-actual.on-time{background:#22c55e}
.v-gbar-actual.late-minor{background:var(--amber)}
.v-gbar-actual.late-major{background:var(--red)}
.v-gbar-actual.in-progress{background:var(--blue)}
.v-gtoday{position:absolute;top:0;bottom:0;width:1.5px;background:var(--amber);z-index:4;pointer-events:none}
.v-gvar{width:72px;min-width:72px;padding:4px 8px;text-align:center;font-size:11px;font-weight:700;font-family:var(--mono)}
.v-gvar-late{color:var(--red)}
.v-gvar-warn{color:var(--amber)}
.v-gvar-ok{color:var(--green)}
.v-gvar-na{color:var(--text3);font-weight:400}
.v-gtask-rows{display:none}
.v-gtask{display:flex;align-items:center;min-height:28px;border-bottom:1px solid var(--border);background:rgba(0,0,0,.2)}
.v-gtask-lbl{width:190px;min-width:190px;padding:5px 14px 5px 28px;border-right:1px solid var(--border);font-size:11px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.v-gtask-bars{flex:1;position:relative;height:28px;border-right:1px solid var(--border)}
.v-gbar-task-planned{position:absolute;height:6px;top:50%;margin-top:-3px;border-radius:2px;background:rgba(96,165,250,.15);border:1px solid rgba(96,165,250,.3);z-index:1}
.v-gbar-task-actual{position:absolute;height:8px;top:50%;margin-top:-4px;border-radius:2px;z-index:2}
.v-glegend{display:flex;gap:16px;padding:10px 16px;border-top:1px solid var(--border);flex-wrap:wrap;background:var(--card2)}
.v-gleg-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text3)}
.v-gleg-sw{width:18px;height:7px;border-radius:2px}
</style>
</head>
<body>

<!-- ═══ LOGIN ═══ -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">⚒ CPM VIEWER</div>
    <div class="login-sub">Project Dashboard</div>
    <div class="login-badge">🔒 Read-Only Access</div>
    <label class="login-label">Viewer Password</label>
    <div class="pw-wrap">
      <input type="password" id="login-pw" class="login-input" placeholder="Enter password" onkeydown="if(event.key==='Enter')doLogin()">
      <button class="pw-toggle" onclick="togglePwVisibility()" title="Show/hide password" tabindex="-1">👁</button>
    </div>
    <div id="login-err" class="login-err"></div>
    <button class="login-btn" onclick="doLogin()">View Projects →</button>
    <div style="margin-top:20px;font-size:11px;color:var(--text3)">Data is encrypted. Contact Faisal for password.</div>
    <div style="margin-top:8px;font-size:10px;color:var(--border)" id="login-ver"></div>
  </div>
</div>

<!-- ═══ APP ═══ -->
<div id="app-screen">
  <div class="topbar">
    <div class="topbar-brand">⚒ CPM VIEWER</div>
    <div class="topbar-right">
      <div class="snap-block" id="topbar-ts-block" style="display:none">
        <div class="snap-date" id="topbar-ts-date"></div>
        <div class="snap-label fresh" id="topbar-ts-label"></div>
      </div>
      <span class="ro-badge">READ ONLY</span>
      <button class="lock-btn" onclick="doLock()">🔒 Lock</button>
    </div>
  </div>

  <div class="proj-selector-bar" id="proj-selector">
    <div class="proj-dropdown-wrap">
      <button class="proj-dropdown-btn" id="proj-dropdown-btn" onclick="toggleProjDropdown()">
        <span id="proj-dropdown-label">Select project…</span>
        <span class="proj-dropdown-arrow">▾</span>
      </button>
      <div class="proj-dropdown-menu" id="proj-dropdown-menu"></div>
    </div>
    <div id="proj-report-btn-wrap"></div>
  </div>

  <div class="tabs" id="main-tabs">
    <button class="tab-btn active" data-tab="dashboard" onclick="switchTab('dashboard')">Dashboard</button>
    <button class="tab-btn" data-tab="phases" onclick="switchTab('phases')">Phases & Tasks</button>
    <button class="tab-btn" data-tab="gantt" onclick="switchTab('gantt')">Gantt</button>
    <button class="tab-btn" data-tab="ledger" onclick="switchTab('ledger')">Bank Ledger</button>
    <button class="tab-btn" data-tab="investors" onclick="switchTab('investors')">Investors</button>
    <button class="tab-btn" data-tab="finance" onclick="switchTab('finance')">Finance</button>
  </div>

  <div class="tab-pane active" id="tab-dashboard"></div>
  <div class="tab-pane" id="tab-phases"></div>
  <div class="tab-pane" id="tab-gantt"></div>

<script>
// ── CONFIG ──
const VIEWER_VERSION    = 'v2.1.2';

const DEFAULT_FOLDER_ID = '1zaQBENpzmLk1YSEvP2mR5iwIFyMUL3Z-';
const SHARED_FILE_NAME  = 'cpm_shared.json';

// ── STATE ──
let viewerData = null;

// ── HELPERS ──
function fmt$(n){return new Intl.NumberFormat('en-US',{style:'currency',currency:'USD',maximumFractionDigits:0}).format(n||0);}
function fmtPct(n){return (n*100).toFixed(1)+'%';}
function fmtDate(s){if(!s)return '—';const d=new Date(s+'T12:00:00');return isNaN(d)?s:d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}

function getFolderId(){
  const p=new URLSearchParams(window.location.search);
  return p.get('folder')||DEFAULT_FOLDER_ID;
}

// ── PASSWORD TOGGLE ──
function togglePwVisibility(){
  const inp = document.getElementById('login-pw');

    btn.textContent = '🙈';

    btn.textContent = '👁';

}

// ── FETCH JSON from public Drive folder (API key auth) ──
const DRIVE_API_KEY = 'AIzaSyAl_KKsplXM59JuD9tRx2uup9nz7Uuozd8';

async function fetchSharedData(password){
  const folderId = getFolderId();
  try{
    // Step 1: List files in the shared folder using the API key
    const listResp = await fetch(
      `https://www.googleapis.com/drive/v3/files?q=name='${SHARED_FILE_NAME}'+and+'${folderId}'+in+parents+and+trashed=false&fields=files(id)&key=${DRIVE_API_KEY}`
    );
    if(!listResp.ok) throw new Error(`Drive API error: ${listResp.status}`);
    const listJson = await listResp.json();

    let fileId = null;
    if(listJson.files && listJson.files.length > 0){
      fileId = listJson.files[0].id;
    } else {
      // Fallback: try ?file=ID in URL (useful if folder listing fails)
      const p = new URLSearchParams(window.location.search);
      fileId = p.get('file') || null;
    }
    if(!fileId) throw new Error('File not found in shared folder.');

    // Step 2: Download the file content using the API key
    const fileResp = await fetch(
      `https://www.googleapis.com/drive/v3/files/${fileId}?alt=media&key=${DRIVE_API_KEY}`
    );
    if(!fileResp.ok) throw new Error(`Download failed: ${fileResp.status}`);
    const wrapper = await fileResp.json();

    if(!wrapper.enc) throw new Error('Invalid data format — missing encryption payload.');

    // Step 3: Decrypt with CryptoJS AES
    const decrypted = CryptoJS.AES.decrypt(wrapper.enc, password);
    const plaintext = decrypted.toString(CryptoJS.enc.Utf8);
    if(!plaintext) throw new Error('Wrong password or corrupted data.');

    const data = JSON.parse(plaintext);
    return {data, exportedAt: wrapper.exportedAt};

  } catch(e){
    throw e;
  }
}

// ── LOGIN ──
async function doLogin(){
  const pw = document.getElementById('login-pw').value;
  const err = document.getElementById('login-err');
  err.textContent = '';
  if(!pw){err.textContent='Enter the viewer password.';return;}

  const btn = document.querySelector('.login-btn');
  btn.textContent = 'Loading…';
  btn.disabled = true;

  try{
    const {data, exportedAt} = await fetchSharedData(pw);
    viewerData = data;

    // Show app
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app-screen').style.display = 'block';

    // Timestamp — prominent topbar block with relative age
    const ts = exportedAt ? new Date(exportedAt).toLocaleString() : 'Unknown';
    const {label, stale} = fmtRelativeAge(exportedAt);
    const dateEl = document.getElementById('topbar-ts-date');
    const labelEl = document.getElementById('topbar-ts-label');
    const blockEl = document.getElementById('topbar-ts-block');
    if(dateEl) dateEl.textContent = ts;
    if(labelEl){
      labelEl.textContent = label;
      labelEl.className = 'snap-label ' + (stale ? 'stale' : 'fresh');
    }
    if(blockEl) blockEl.style.display = 'flex';
    document.getElementById('footer-credit').textContent =
      `CPM Viewer ${VIEWER_VERSION} — Snapshot: ${ts} · Read-only`;

    buildProjectSelector();
    if(viewerData.projects && viewerData.projects.length > 0){
      selectProject(viewerData.projects[0].id);
    }

  } catch(e){
    err.textContent = e.message.includes('Wrong password') ? 'Incorrect password. Try again.' :
                      `Error: ${e.message}`;
    btn.textContent = 'View Projects →';
    btn.disabled = false;
  }
}

function doLock(){

  document.getElementById('login-pw').value = '';

// ── PROJECT SELECTOR ──
function buildProjectSelector(){

function toggleProjDropdown(){

function _closeProjOnOutside(e){

}

function closeProjDropdown(){

function selectProject(id){

function switchTab(tab){

function renderAll(){

// ── PHASES LABELS ──
// Must match CPM's PHASE_LABELS exactly so published data renders correctly
const PHASE_LABELS = {
  land:'Land Acquisition',
  phase1:'Pre-Construction',
  phase2:'Site Prep & Foundation',
  phase3:'Framing & Rough-Ins',
  phase4:'Interior & Exterior Finishes',
  phase5:'Site Completion',
  phase6:'Close Out',
  mgmt:'GC Management Fee'
};

const STATUS_ORDER = ['complete','in-progress','in_progress','pending','blocked'];

// ── CALC HELPERS ──
function calcLedger(proj){
  // Balance includes ALL entries (reversed bill pay returns are real money back)
  // Display totals exclude reversed entries to avoid inflating the KPI cards
  const all = (proj.ledger||[]).filter(e=>e.type!=='Non-Project Entry');
  let balance=0, totalIn=0, totalOut=0;
  all.forEach(e=>{
    const dep = parseFloat(e.deposit)||0;
    const wd  = parseFloat(e.withdrawal)||0;
    balance += dep - wd;               // balance: include all
    if(!e.reversed){
      totalIn  += dep;                 // display totals: exclude reversed
      totalOut += wd;
    }
  });
  return {balance, totalIn, totalOut};
}

function calcTasks(proj){
  const tasks = proj.tasks || [];
  const done = tasks.filter(t => t.status === 'complete').length;
  return {done, total: tasks.length, pct: tasks.length ? done/tasks.length : 0};
}

function calcPhaseProgress(proj, phaseId){
  const tasks = (proj.tasks||[]).filter(t => t.phaseId === phaseId);
  if(!tasks.length) return {done:0,total:0,pct:0};
  const done = tasks.filter(t => t.status === 'complete').length;
  return {done, total:tasks.length, pct:done/tasks.length};
}

// ── DASHBOARD ──

  el.innerHTML = `

      <div class="kpi amber"><div class="kpi-label">Bank Balance</div><div class="kpi-val">${fmt$(balance)}</div><div class="kpi-sub">Available cash</div></div>

      <div class="kpi ${pctBudget>1?'red':'green'}"><div class="kpi-label">Budget Used</div><div class="kpi-val">${fmtPct(pctBudget)}</div><div class="kpi-sub">${fmt$(totalOut)} of ${fmt$(totalBudget)}</div></div>
      <div class="kpi purple"><div class="kpi-label">Task Completion</div><div class="kpi-val">${done}/${total}</div><div class="kpi-sub">${fmtPct(pct)} overall</div></div>
      <div class="kpi ${noSale?'amber':grossProfit>=0?'green':'red'}"><div class="kpi-label">Est. Profit</div><div class="kpi-val" style="color:${noSale?'var(--text3)':grossProfit>=0?'var(--green)':'var(--red)'}">${noSale?'TBD':fmt$(grossProfit)}</div><div class="kpi-sub">After all fees</div></div>
      <div class="kpi ${noSale?'amber':roi>=0?'green':'red'}"><div class="kpi-label">Est. ROI</div><div class="kpi-val" style="color:${noSale?'var(--text3)':roi>=0?'var(--green)':'var(--red)'}">${noSale?'—':fmtPct(roi)}</div><div class="kpi-sub">Return on investment</div></div>
    </div>
    <div class="card">
      <div class="card-title">Phase Progress</div>
      ${phaseRows||'<div style="color:var(--text3);font-size:13px">No tasks defined yet.</div>'}
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
      <div class="card">
        <div class="card-title">Project Info</div>
        <table class="data-table">
          <tr><td style="color:var(--text3);width:120px">GC</td><td>${p.info?.gc||'—'}</td></tr>
          <tr><td style="color:var(--text3)">Start Date</td><td>${fmtDate(p.info?.startDate)}</td></tr>
          <tr><td style="color:var(--text3)">Est. Complete</td><td>${fmtDate(p.info?.estCompletion)}</td></tr>
          <tr><td style="color:var(--text3)">Address</td><td>${p.info?.address||'—'}</td></tr>
        </table>
      </div>
      <div class="card">
        <div class="card-title">Active Blockers</div>
        ${(p.tasks||[]).filter(t=>t.status==='blocked'&&t.blocker).length
          ? (p.tasks||[]).filter(t=>t.status==='blocked'&&t.blocker).map(t=>
              `<div style="padding:8px 0;border-bottom:1px solid var(--border)">
                <div style="font-size:13px;font-weight:600;color:var(--text)">${t.name}</div>
                <div style="font-size:12px;color:var(--red);margin-top:3px">⚠ ${t.blocker}</div>
              </div>`).join('')
          : '<div style="font-size:13px;color:var(--text3)">No active blockers 🎉</div>'}

// ── PHASES & TASKS ──
// 8-column layout: Task | Status | Cost | Plan Start | Plan End | Actual Start | Actual End | Blocker
const PHASE_TABLE_COLS = `<colgroup>
  <col style="width:26%">
  <col style="width:10%">
  <col style="width:8%">
  <col style="width:9%">
  <col style="width:9%">

  <col style="width:9%">

</colgroup>`;

function renderPhases(){
  const p = currentProj; if(!p) return;

  el.innerHTML = phaseKeys.map(pid => {

    const done = tasks.filter(t=>t.status==='complete').length;

      </div>
      <table class="data-table" style="table-layout:fixed">
        ${PHASE_TABLE_COLS}
        <thead><tr><th>Task</th><th>Status</th><th>Cost</th><th>Plan Start</th><th>Plan End</th><th>Actual Start</th><th>Actual End</th><th>Blocker</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
  }).join('');
}

// ── LEDGER ──
function renderLedger(){
  const p = currentProj; if(!p) return;
  const el = document.getElementById('tab-ledger');
  // Sort oldest → newest (natural construction timeline order)
  const allEntries = [...(p.ledger||[])].sort((a,b)=>new Date(a.date)-new Date(b.date));
  const {balance, totalIn, totalOut} = calcLedger(p);
  if(!allEntries.length){el.innerHTML='<div style="color:var(--text3);padding:20px">No transactions yet.</div>';return;}

  // Build running balance oldest→newest
  let running = 0;
  const rows = allEntries.map(e=>{
    const dep = parseFloat(e.deposit)||0;
    const wd  = parseFloat(e.withdrawal)||0;
    const isDeposit = dep > 0;
    const amt = isDeposit ? dep : wd;
    const reversed = !!e.reversed;
    running += dep - wd;
    const phaseLabel = PHASE_LABELS[e.phase] || e.phase || '—';
    const rowStyle = reversed ? 'opacity:0.45;text-decoration:line-through' : '';
    return `<tr style="${rowStyle}">
      <td style="white-space:nowrap">${fmtDate(e.date)}</td>
      <td>${e.description||'—'}${reversed?' <span style="color:var(--red);font-size:10px">[REVERSED]</span>':''}</td>
      <td><span class="ledger-phase-tag">${phaseLabel}</span></td>
      <td class="${isDeposit?'ledger-credit':'ledger-debit'}">${isDeposit?'+':'-'}${fmt$(amt)}</td>
      <td style="font-family:var(--mono);font-size:11px">${fmt$(running)}</td>
      <td style="color:var(--text3);font-size:11px">${e.memo||''}</td>
    </tr>`;
  }).join('');

  el.innerHTML = `
    <div class="kpi-grid" style="margin-bottom:20px;grid-template-columns:repeat(3,1fr)">
      <div class="kpi green"><div class="kpi-label">Current Balance</div><div class="kpi-val">${fmt$(balance)}</div></div>
      <div class="kpi blue"><div class="kpi-label">Total Deposits</div><div class="kpi-val">${fmt$(totalIn)}</div></div>
      <div class="kpi red"><div class="kpi-label">Total Withdrawals</div><div class="kpi-val">${fmt$(totalOut)}</div></div>
    </div>
    <div class="card" style="padding:0;overflow:hidden">
      <table class="data-table">
        <thead><tr><th>Date</th><th>Description</th><th>Phase</th><th>Amount</th><th>Running Balance</th><th>Memo</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;

}

function renderFinance(){

  const el = document.getElementById('tab-finance');
  const f = p.finance||{};
  const salePrice = f.estSalePrice||0;
  const commission = salePrice*(f.commissionPct||6)/100;

  const grossProfit = salePrice - totalBudget - totalClosing - (f.mgmtAdminFees||0);
  const totalCost = totalBudget + totalClosing + (f.mgmtAdminFees||0);
  const roi = totalBudget > 0 ? grossProfit/totalBudget : 0;

// ── GANTT — PHASE DEFINITIONS ──
// Mirrors CPM's PHASES array — colors and IDs must match
const VIEWER_PHASES = [
  {id:'land',  name:'Land Acquisition', color:'#a78bfa'},
  {id:'phase1',name:'Phase 1',          color:'#60a5fa'},
  {id:'phase2',name:'Phase 2',          color:'#34d399'},
  {id:'phase3',name:'Phase 3',          color:'#fbbf24'},
  {id:'phase4',name:'Phase 4',          color:'#f472b6'},
  {id:'phase5',name:'Phase 5',          color:'#22d3ee'},
  {id:'phase6',name:'Phase 6',          color:'#4ade80'},
  {id:'mgmt',  name:'Mgmt Fee',         color:'#fb923c'}
];

// ── GANTT — DATE HELPERS ──
function vNormDate(s){
  // YYYY-MM-DD passthrough; also handles MM/DD/YYYY and MM/DD/YY
  if(!s)return null;
  const str=s.trim();
  const mdy4=str.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if(mdy4)return `${mdy4[3]}-${mdy4[1].padStart(2,'0')}-${mdy4[2].padStart(2,'0')}`;
  const mdy2=str.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2})$/);
  if(mdy2)return `20${mdy2[3]}-${mdy2[1].padStart(2,'0')}-${mdy2[2].padStart(2,'0')}`;
  const ymd=str.match(/^\d{4}-\d{2}-\d{2}$/);
  if(ymd)return str;
  return null;
}

// ── GANTT — PHASE CALC HELPERS (viewer-scoped, use currentProj) ──
function vScheduledTasks(phaseId){
  return (currentProj.tasks||[]).filter(t=>t.phaseId===phaseId&&!t.noSchedule);
}
function vPhasePlannedStart(phaseId){
  const d=vScheduledTasks(phaseId).map(t=>vNormDate(t.plannedStart)).filter(Boolean);
  return d.length?d.sort()[0]:null;
}
function vPhasePlannedEnd(phaseId){
  const d=vScheduledTasks(phaseId).map(t=>vNormDate(t.plannedEnd)).filter(Boolean);
  return d.length?d.sort().pop():null;
}
function vPhaseActualStart(phaseId){
  const d=vScheduledTasks(phaseId).map(t=>vNormDate(t.actualStart)).filter(Boolean);
  return d.length?d.sort()[0]:null;
}
function vPhaseActualEnd(phaseId){
  const d=vScheduledTasks(phaseId).map(t=>vNormDate(t.actualEnd)).filter(Boolean);
  return d.length?d.sort().pop():null;
}
function vPhaseDelay(phaseId){
  const pe=vPhasePlannedEnd(phaseId);
  const ae=vPhaseActualEnd(phaseId);
  if(!pe||!ae)return null;
  return Math.round((new Date(ae+'T12:00:00')-new Date(pe+'T12:00:00'))/(864e5));
}
function vPhaseTaskPct(phaseId){
  const tasks=(currentProj.tasks||[]).filter(t=>t.phaseId===phaseId);
  if(!tasks.length)return 0;
  return tasks.filter(t=>t.status==='complete').length/tasks.length;
}

// ── GANTT — RENDER ──
function renderGantt(){
  const p=currentProj; if(!p) return;
  const el=document.getElementById('tab-gantt');

  // Collect all dates to determine chart range
  const allDates=[];
  if(p.info?.startDate)allDates.push(new Date(p.info.startDate+'T12:00:00'));
  if(p.info?.estCompletion)allDates.push(new Date(p.info.estCompletion+'T12:00:00'));
  (p.tasks||[]).forEach(t=>{
    ['plannedStart','plannedEnd','actualStart','actualEnd'].forEach(f=>{
      const v=vNormDate(t[f]);
      if(v)allDates.push(new Date(v+'T12:00:00'));
    });
  });

  if(!allDates.length){
    el.innerHTML='<div style="padding:40px;text-align:center;color:var(--text3);font-size:13px">No schedule data available — dates will appear here once the GC has provided them.</div>';
    return;
  }

  const minRaw=new Date(Math.min(...allDates));
  const maxRaw=new Date(Math.max(...allDates));
  const today=new Date();today.setHours(12,0,0,0);

  const minDate=new Date(minRaw.getFullYear(),minRaw.getMonth(),1);
  const rawMax=new Date(Math.max(maxRaw,today));
  const maxDate=new Date(rawMax.getFullYear(),rawMax.getMonth()+2,1);

  const totalDays=(maxDate-minDate)/864e5;
  const pct=days=>Math.max(0,Math.min(100,(days/totalDays)*100));
  const dayOff=s=>{if(!s)return null;const d=new Date(s+'T12:00:00');return(d-minDate)/864e5;};
  const todayOff=(today-minDate)/864e5;
  const todayPct=pct(todayOff);

  // Build month header cells HTML
  let monthsHtml='';
  let d=new Date(minDate);
  while(d<maxDate){
    const lbl=d.toLocaleDateString('en-US',{month:'short',year:'2-digit'});
    const s=(d-minDate)/864e5;
    const nm=new Date(d.getFullYear(),d.getMonth()+1,1);
    const e=Math.min((nm-minDate)/864e5,totalDays);
    monthsHtml+=`<div class="v-gmonth" style="width:${pct(e-s)}%">${lbl}</div>`;
    d=nm;
  }

  // Phase stats
  let nComplete=0,nOnTime=0,nMinor=0,nMajor=0,nUnstarted=0;

  // Build phase rows HTML
  let phaseRowsHtml='';

  VIEWER_PHASES.forEach(ph=>{
    const ps=dayOff(vPhasePlannedStart(ph.id));
    const pe=dayOff(vPhasePlannedEnd(ph.id));
    const as=dayOff(vPhaseActualStart(ph.id));
    const ae=dayOff(vPhaseActualEnd(ph.id));
    const delay=vPhaseDelay(ph.id);
    const taskPct=vPhaseTaskPct(ph.id);
    const tasks=(p.tasks||[]).filter(t=>
      t.phaseId===ph.id&&!t.noSchedule&&(t.plannedStart||t.plannedEnd||t.actualStart||t.actualEnd));

    // Classify
    let barClass='in-progress';
    if(taskPct>=1)       {barClass='complete'; nComplete++;}
    else if(delay===null) {barClass='in-progress';nUnstarted++;}
    else if(delay>7)      {barClass='late-major';nMajor++;}
    else if(delay>0)      {barClass='late-minor';nMinor++;}
    else                  {barClass='on-time';   nOnTime++;}

    const actualEndOff=ae!==null?ae:(as!==null?todayOff:null);

    const varHtml=delay===null
      ?'<span class="v-gvar-na">—</span>'
      :delay===0?'<span class="v-gvar-ok">0d</span>'
      :delay>0?`<span class="v-gvar-${delay>7?'late':'warn'}">+${delay}d</span>`
      :`<span class="v-gvar-ok">${delay}d</span>`;

    const taskId='vgt-'+ph.id;
    const chevId='vgc-'+ph.id;
    const hasTasks=tasks.length>0;

    phaseRowsHtml+=`
      <div class="v-gphase" onclick="${hasTasks?`toggleVGanttPhase('${taskId}','${chevId}',this)`:''}" style="${hasTasks?'':'cursor:default'}">
        <div class="v-gphase-lbl">
          <div class="v-gdot" style="background:${ph.color}"></div>
          <span class="v-gphase-name">${ph.name}</span>
          ${hasTasks?`<span class="v-gchev" id="${chevId}">&#9654;</span>`:''}
        </div>
        <div class="v-gbars">
          ${(ps!==null&&pe!==null)?`<div class="v-gbar-planned" style="left:${pct(ps)}%;width:${pct(pe-ps)}%;min-width:6px"></div>`:''}
          ${(as!==null&&actualEndOff!==null)?`<div class="v-gbar-actual ${barClass}" style="left:${pct(as)}%;width:${pct(actualEndOff-as)}%;min-width:6px"></div>`:''}
          <div class="v-gtoday" style="left:${todayPct}%"></div>
        </div>
        <div class="v-gvar">${varHtml}</div>
      </div>
      <div class="v-gtask-rows" id="${taskId}" style="display:none">
        ${tasks.map(t=>{
          const tps=dayOff(vNormDate(t.plannedStart)),tpe=dayOff(vNormDate(t.plannedEnd));
          const tas=dayOff(vNormDate(t.actualStart)),tae=dayOff(vNormDate(t.actualEnd));
          const tActualEnd=tae!==null?tae:(tas!==null?todayOff:null);
          let tDelay=null,tColor=ph.color;
          if(tae!==null&&tpe!==null){
            tDelay=Math.round(tae-tpe);
            tColor=tDelay>7?'var(--red)':tDelay>0?'var(--amber)':tDelay<0?'var(--green)':ph.color;
          }else if(tas!==null){tColor='var(--blue)';}
          return `<div class="v-gtask">
            <div class="v-gtask-lbl" title="${t.name}">${t.name}</div>
            <div class="v-gtask-bars">
              ${(tps!==null&&tpe!==null)?`<div class="v-gbar-task-planned" style="left:${pct(tps)}%;width:${pct(tpe-tps)}%;min-width:8px"></div>`:''}
              ${(tas!==null&&tActualEnd!==null)?`<div class="v-gbar-task-actual" style="background:${tColor};left:${pct(tas)}%;width:${pct(tActualEnd-tas)}%;min-width:8px"></div>`:''}
              <div class="v-gtoday" style="left:${todayPct}%"></div>
            </div>
            <div class="v-gvar ${tDelay===null?'v-gvar-na':tDelay>0?'v-gvar-late':'v-gvar-ok'}" style="font-size:10px">
              ${tDelay===null?'—':tDelay>0?'+'+tDelay+'d':tDelay===0?'0d':tDelay+'d'}
            </div>
          </div>`;
        }).join('')}
      </div>`;
  });

  // Summary strip HTML
  const info=p.info||{};
  const estComplete=info.estCompletion
    ?new Date(info.estCompletion+'T12:00:00').toLocaleDateString('en-US',{month:'short',year:'numeric'})
    :'TBD';
  const summaryHtml=`<div class="v-gantt-summary">
    ${nComplete?`<div class="v-gstat"><span class="v-gstat-val" style="color:var(--green)">${nComplete}</span><span class="v-gstat-lbl">Complete</span></div><div class="v-gstat-div"></div>`:''}
    ${nOnTime?`<div class="v-gstat"><span class="v-gstat-val" style="color:#22c55e">${nOnTime}</span><span class="v-gstat-lbl">On Time</span></div><div class="v-gstat-div"></div>`:''}
    ${nMinor?`<div class="v-gstat"><span class="v-gstat-val" style="color:var(--amber)">${nMinor}</span><span class="v-gstat-lbl">Minor Delay</span></div><div class="v-gstat-div"></div>`:''}
    ${nMajor?`<div class="v-gstat"><span class="v-gstat-val" style="color:var(--red)">${nMajor}</span><span class="v-gstat-lbl">Late &gt;7d</span></div><div class="v-gstat-div"></div>`:''}
    ${nUnstarted?`<div class="v-gstat"><span class="v-gstat-val" style="color:var(--text3)">${nUnstarted}</span><span class="v-gstat-lbl">Not Started</span></div><div class="v-gstat-div"></div>`:''}
    <div class="v-gstat" style="margin-left:auto">
      <span class="v-gstat-val">${estComplete}</span>
      <span class="v-gstat-lbl">Est. Completion</span>
    </div>
  </div>`;

  el.innerHTML=summaryHtml+`
    <div class="v-gantt-outer">
      <div class="v-gantt-scroll">
        <div class="v-gantt-inner">
          <div class="v-ghdr">
            <div class="v-gcol-label">Phase / Task</div>
            <div class="v-gcol-bars" style="position:relative">
              ${monthsHtml}
              <div class="v-gtoday" style="left:${todayPct}%">
                <div style="position:absolute;bottom:calc(100% + 2px);left:50%;transform:translateX(-50%);font-size:9px;font-weight:700;color:var(--amber);font-family:var(--mono);white-space:nowrap">Today</div>
              </div>
            </div>
            <div class="v-gcol-var">+/- Days</div>
          </div>
          ${phaseRowsHtml}
        </div>
      </div>
      <div class="v-glegend">
        <div class="v-gleg-item"><div class="v-gleg-sw" style="background:rgba(96,165,250,.2);border:1px solid rgba(96,165,250,.4)"></div>Planned</div>
        <div class="v-gleg-item"><div class="v-gleg-sw" style="background:var(--green)"></div>Complete</div>
        <div class="v-gleg-item"><div class="v-gleg-sw" style="background:#22c55e"></div>On time</div>
        <div class="v-gleg-item"><div class="v-gleg-sw" style="background:var(--amber)"></div>Minor delay (&lt;7d)</div>
        <div class="v-gleg-item"><div class="v-gleg-sw" style="background:var(--red)"></div>Late (&gt;7d)</div>
        <div class="v-gleg-item"><div class="v-gleg-sw" style="background:var(--blue)"></div>In progress</div>
        <div class="v-gleg-item" style="margin-left:auto"><div style="width:2px;height:12px;background:var(--amber);margin-right:4px"></div>Today</div>
      </div>
    </div>`;
}

function toggleVGanttPhase(taskId, chevId, row){
  const tc=document.getElementById(taskId);
  if(!tc)return;
  const isOpen=tc.style.display==='block';
  tc.style.display=isOpen?'none':'block';
  row.classList.toggle('open',!isOpen);
  const chev=document.getElementById(chevId);
  if(chev)chev.classList.toggle('open',!isOpen);
}

function fmtRelativeAge(exportedAt){
  // Returns {label, stale} — label e.g. "Updated Today", stale=true when 7+ days
  if(!exportedAt) return {label:'Unknown snapshot date', stale:false};
  const now=new Date();
  const then=new Date(exportedAt);
  const diffMs=now-then;
  const diffDays=Math.floor(diffMs/(1000*60*60*24));
  if(diffDays===0) return {label:'Data Snapshot · Updated Today', stale:false};
  if(diffDays===1) return {label:'Data Snapshot · Updated Yesterday', stale:false};
  if(diffDays<7)   return {label:`Data Snapshot · Updated ${diffDays} Days Ago`, stale:false};
  return {label:`Data Snapshot · Updated ${diffDays} Days Ago`, stale:true};
}

// ── REPORT MODAL ──
function openReportModal(projectId) {
  const pdfMeta = viewerData.publishedPdfs?.[projectId];
  if (!pdfMeta) { alert('No report PDF available for this project.'); return; }

  const proj = viewerData.projects.find(p => p.id === projectId);
  const projName = proj?.name || 'Project';
  const pubDate = pdfMeta.publishedAt ? new Date(pdfMeta.publishedAt).toLocaleString() : 'Unknown';
  const filename = pdfMeta.filename || `${projName}_report.pdf`;

  // Show loading state
  document.getElementById('report-modal-container').innerHTML = `
    <div class="report-modal-overlay" id="report-overlay" onclick="if(event.target===this)closeReportModal()">
      <div class="report-modal">
        <h3>📄 Investor Report</h3>
        <div class="report-modal-meta">
          <strong style="color:var(--text)">${projName}</strong><br>
          File: <span style="color:var(--amber);font-family:var(--mono);font-size:11px">${filename}</span><br>
          Published: ${pubDate}
        </div>
        <div class="report-loading" id="report-loading">⏳ Loading PDF…</div>
        <div id="report-actions" style="display:none">
          <div class="report-modal-actions">
            <button class="report-action-btn" id="btn-open-tab">
              <span class="report-action-icon">🔗</span>
              <div>
                <div class="report-action-label">Open in Browser</div>
                <div class="report-action-sub">View the PDF in a new tab</div>
              </div>
            </button>
            <button class="report-action-btn" id="btn-download">
              <span class="report-action-icon">⬇</span>
              <div>
                <div class="report-action-label">Download PDF</div>
                <div class="report-action-sub">Save to your device — ${filename}</div>
              </div>
            </button>
          </div>
        </div>
        <div id="report-error" style="display:none;color:var(--red);font-size:12px;margin-bottom:16px;padding:10px;background:rgba(248,113,113,.08);border-radius:8px;border:1px solid rgba(248,113,113,.2)"></div>
        <button class="report-modal-cancel" onclick="closeReportModal()">Cancel</button>
      </div>
    </div>`;

  // Fetch PDF from Drive using API key
  const fileId = pdfMeta.fileId;
  const fetchUrl = `https://www.googleapis.com/drive/v3/files/${fileId}?alt=media&key=${DRIVE_API_KEY}`;

  fetch(fetchUrl)
    .then(res => {
      if (!res.ok) throw new Error(`HTTP ${res.status} — file may not be publicly accessible`);
      return res.blob();
    })
    .then(blob => {
      const blobUrl = URL.createObjectURL(blob);

      // Hide loading, show actions
      document.getElementById('report-loading').style.display = 'none';
      document.getElementById('report-actions').style.display = 'block';

      // Wire up buttons
      document.getElementById('btn-open-tab').onclick = () => {
        window.open(blobUrl, '_blank');
      };
      document.getElementById('btn-download').onclick = () => {
        const a = document.createElement('a');
        a.href = blobUrl;
        a.download = filename;
        a.click();
      };
    })
    .catch(err => {
      console.error('[ReportModal]', err);
      document.getElementById('report-loading').style.display = 'none';
      const errEl = document.getElementById('report-error');
      errEl.style.display = 'block';
      errEl.textContent = `⚠ Could not load PDF: ${err.message}. The file may need to be re-published.`;
    });
}

function closeReportModal() {
  document.getElementById('report-modal-container').innerHTML = '';
}
