<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PropIQ · Rental Investment Analyzer</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #080c14;
      --surface: #0e1521;
      --surface2: #141d2e;
      --border: rgba(255,255,255,0.07);
      --border2: rgba(255,255,255,0.12);
      --text: #e8edf5;
      --muted: #4a5568;
      --muted2: #718096;
      --gold: #f0b429;
      --gold-dim: rgba(240,180,41,0.15);
      --teal: #00d4aa;
      --teal-dim: rgba(0,212,170,0.12);
      --red: #f56565;
      --red-dim: rgba(245,101,101,0.12);
      --blue: #4299e1;
      --blue-dim: rgba(66,153,225,0.12);
      --purple: #9f7aea;
      --purple-dim: rgba(159,122,234,0.12);
      --font-display: 'Syne', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }
    body { background: var(--bg); color: var(--text); font-family: var(--font-mono); overflow-x: hidden; }
    input[type=range] {
      -webkit-appearance: none; appearance: none;
      width: 100%; height: 2px; border-radius: 2px;
      background: rgba(255,255,255,0.08); outline: none; cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 14px; height: 14px;
      border-radius: 50%; background: var(--gold);
      border: 2px solid var(--bg); box-shadow: 0 0 10px rgba(240,180,41,0.6);
      cursor: pointer; transition: transform 0.15s;
    }
    input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.2); }
    input[type=range]::-moz-range-thumb {
      width: 14px; height: 14px; border-radius: 50%;
      background: var(--gold); border: 2px solid var(--bg); cursor: pointer;
    }
    input[type=text], input[type=number] {
      background: var(--surface2); border: 1px solid var(--border2);
      color: var(--text); font-family: var(--font-mono); font-size: 0.85rem;
      padding: 0.6rem 0.9rem; border-radius: 6px; outline: none; width: 100%;
      transition: border-color 0.2s;
    }
    input[type=text]:focus, input[type=number]:focus { border-color: var(--gold); }
    button { cursor: pointer; font-family: var(--font-mono); }
    ::-webkit-scrollbar { width: 3px; height: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }
    .fadeIn { animation: fadeIn 0.4s ease forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .pulse { animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
    @media (max-width: 900px) {
      .main-layout { flex-direction: column !important; }
      .left-panel { width: 100% !important; border-right: none !important; border-bottom: 1px solid var(--border) !important; max-height: none !important; overflow-y: visible !important; }
      .right-panel { max-height: none !important; overflow-y: visible !important; }
      .scenario-grid { grid-template-columns: 1fr !important; }
      .metrics-row { grid-template-columns: 1fr 1fr !important; }
    }
    @media (max-width: 600px) {
      /* Login box */
      .piq-login-box { width: calc(100vw - 32px) !important; padding: 32px 20px !important; }
      /* Settings box */
      .piq-settings-box { width: calc(100vw - 32px) !important; padding: 20px 16px !important; }
      .piq-pw-fields { grid-template-columns: 1fr !important; }
      /* Topbar */
      #propiq-topbar { padding: 0 10px !important; gap: 6px !important; }
      /* Timeout warning */
      #propiq-timeout-warning { bottom: 12px !important; right: 12px !important; left: 12px !important; max-width: none !important; }
      /* ZIP input area */
      .zip-row { flex-wrap: wrap !important; gap: 8px !important; }
    }
    @media (max-width: 480px) {
      .piq-timer { display: none !important; }
    }
  </style>

  <!-- PASSWORD + TIMER STYLES -->
  <style>
    #propiq-login {
      position: fixed; inset: 0; z-index: 9999;
      background: #080c14;
      display: flex; align-items: center; justify-content: center;
    }
    .piq-login-box {
      background: #0e1521; border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px; padding: 48px 40px; width: 380px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 0 1px rgba(240,180,41,0.1);
    }
    .piq-logo { text-align: center; margin-bottom: 32px; }
    .piq-logo .icon { font-size: 40px; margin-bottom: 12px; }
    .piq-logo h1 { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; color: #e8edf5; letter-spacing: 1px; }
    .piq-logo p { font-size: 12px; color: #4a5568; margin-top: 4px; font-family: 'JetBrains Mono', monospace; }
    .piq-field label { display: block; font-size: 11px; font-weight: 600; color: #718096; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; font-family: 'Syne', sans-serif; }
    .piq-pw-wrap { position: relative; }
    .piq-pw-wrap input { width: 100%; padding: 12px 44px 12px 16px; background: #141d2e; border: 1px solid rgba(255,255,255,0.12); border-radius: 10px; color: #e8edf5; font-size: 15px; font-family: 'JetBrains Mono', monospace; outline: none; transition: border-color 0.2s; }
    .piq-pw-wrap input:focus { border-color: #f0b429; box-shadow: 0 0 0 3px rgba(240,180,41,0.1); }
    .piq-eye { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; font-size: 16px; opacity: 0.4; transition: opacity 0.2s; }
    .piq-eye:hover { opacity: 0.8; }
    .piq-btn { width: 100%; margin-top: 20px; padding: 13px; background: linear-gradient(135deg, #f0b429, #d97706); border: none; border-radius: 10px; color: #0f0f0f; font-size: 14px; font-weight: 800; font-family: 'Syne', sans-serif; cursor: pointer; letter-spacing: 0.5px; transition: all 0.2s; }
    .piq-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 20px rgba(240,180,41,0.4); }
    .piq-error { color: #f56565; font-size: 12px; margin-top: 10px; text-align: center; display: none; font-family: 'JetBrains Mono', monospace; }
    /* TOPBAR */
    #propiq-topbar { position: fixed; top: 0; left: 0; right: 0; height: 44px; background: rgba(8,12,20,0.95); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,0.07); display: none; align-items: center; justify-content: flex-end; padding: 0 20px; gap: 14px; z-index: 500; }
    .piq-timer { font-size: 11px; color: #4a5568; font-family: 'JetBrains Mono', monospace; display: flex; align-items: center; gap: 5px; }
    .piq-timer-dot { width: 6px; height: 6px; border-radius: 50%; background: #00d4aa; }
    .piq-logout-btn { padding: 5px 14px; background: transparent; border: 1px solid rgba(255,255,255,0.12); border-radius: 6px; color: #718096; font-size: 11px; font-family: 'Syne', sans-serif; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .piq-logout-btn:hover { border-color: #f56565; color: #f56565; }
    /* TIMEOUT WARNING */
    #propiq-timeout-warning { position: fixed; bottom: 24px; right: 24px; background: #0e1521; border: 1px solid #f0b429; border-radius: 14px; padding: 20px 24px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); z-index: 1000; display: none; max-width: 280px; }
    #propiq-timeout-warning h4 { color: #f0b429; font-size: 14px; margin-bottom: 8px; font-family: 'Syne', sans-serif; }
    #propiq-timeout-warning p { color: #718096; font-size: 13px; margin-bottom: 12px; font-family: 'JetBrains Mono', monospace; }
    .piq-countdown { font-size: 32px; font-weight: 700; color: #f0b429; font-family: 'JetBrains Mono', monospace; }
    .piq-stay-btn { margin-top: 12px; padding: 8px 20px; background: #f0b429; border: none; border-radius: 8px; color: #0f0f0f; font-size: 13px; font-weight: 800; font-family: 'Syne', sans-serif; cursor: pointer; width: 100%; }
    /* SETTINGS PANEL */
    #propiq-settings { position: fixed; inset: 0; z-index: 800; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; }
    .piq-settings-box { background: #0e1521; border: 1px solid rgba(255,255,255,0.12); border-radius: 20px; padding: 32px; width: 480px; max-height: 85vh; overflow-y: auto; }
    .piq-settings-box h2 { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 800; color: #e8edf5; margin-bottom: 24px; display: flex; justify-content: space-between; align-items: center; }
    .piq-close { background: none; border: none; color: #4a5568; font-size: 20px; cursor: pointer; }
    .piq-settings-section { margin-bottom: 24px; padding-bottom: 24px; border-bottom: 1px solid rgba(255,255,255,0.07); }
    .piq-settings-section:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
    .piq-settings-section h3 { font-size: 11px; font-weight: 700; color: #4a5568; text-transform: uppercase; letter-spacing: 1px; font-family: 'Syne', sans-serif; margin-bottom: 16px; }
    .piq-settings-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
    .piq-settings-row:last-child { border-bottom: none; }
    .piq-settings-row-info strong { font-size: 13px; color: #e8edf5; font-family: 'Syne', sans-serif; display: block; }
    .piq-settings-row-info span { font-size: 11px; color: #4a5568; font-family: 'JetBrains Mono', monospace; }
    .piq-action-btn { padding: 7px 16px; background: transparent; border: 1px solid rgba(255,255,255,0.12); border-radius: 8px; color: #e8edf5; font-size: 12px; font-family: 'Syne', sans-serif; font-weight: 600; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
    .piq-action-btn:hover { border-color: #f0b429; color: #f0b429; }
    .piq-action-btn.gold { background: #f0b429; color: #0f0f0f; border-color: #f0b429; }
    .piq-action-btn.gold:hover { box-shadow: 0 4px 12px rgba(240,180,41,0.4); }
    .piq-pw-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 12px; }
    .piq-pw-fields input { padding: 9px 12px; background: #141d2e; border: 1px solid rgba(255,255,255,0.12); border-radius: 8px; color: #e8edf5; font-size: 13px; font-family: 'JetBrains Mono', monospace; outline: none; width: 100%; }
    .piq-pw-fields input:focus { border-color: #f0b429; }
    #piq-pw-msg { font-size: 12px; margin-top: 8px; font-family: 'JetBrains Mono', monospace; }
    /* Push React app down when topbar shown */
    #root { padding-top: 0; transition: padding-top 0.2s; }
    #root.with-topbar { padding-top: 44px; }
  </style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="propiq-login">
  <div class="piq-login-box">
    <div class="piq-logo">
      <div class="icon">🏠</div>
      <h1>PropIQ</h1>
      <p>Rental Investment Analyzer</p>
    </div>
    <div class="piq-field">
      <label>Password</label>
      <div class="piq-pw-wrap">
        <input type="password" id="piq-pw-input" placeholder="Enter password" onkeydown="if(event.key==='Enter')piqLogin()">
        <button class="piq-eye" onclick="piqToggleEye()" tabindex="-1"><span id="piq-eye-icon">👁</span></button>
      </div>
    </div>
    <button class="piq-btn" onclick="piqLogin()">Access PropIQ</button>
    <div class="piq-error" id="piq-error">Incorrect password. Try again.</div>
  </div>
</div>

<!-- TOPBAR -->
<div id="propiq-topbar">
  <div class="piq-timer">
    <span class="piq-timer-dot" id="piq-timer-dot"></span>
    <span id="piq-timer-display">10:00</span>
  </div>
  <button class="piq-action-btn" onclick="openPiqSettings()">⚙ Settings</button>
  <button class="piq-logout-btn" onclick="piqSaveAndLogout()">Save & Logout</button>
</div>

<!-- TIMEOUT WARNING -->
<div id="propiq-timeout-warning">
  <h4>⏱ Session Expiring</h4>
  <p>Logging out in:</p>
  <div class="piq-countdown" id="piq-countdown">60</div>
  <button class="piq-stay-btn" onclick="piqResetTimer()">Stay Logged In</button>
</div>

<!-- SETTINGS PANEL -->
<div id="propiq-settings" onclick="if(event.target===this)closePiqSettings()">
  <div class="piq-settings-box">
    <h2>Settings <button class="piq-close" onclick="closePiqSettings()">✕</button></h2>

    <div class="piq-settings-section">
      <h3>Data</h3>
      <div class="piq-settings-row">
        <div class="piq-settings-row-info"><strong>Print / Save as PDF</strong><span>Print current analysis to PDF</span></div>
        <button class="piq-action-btn" onclick="window.print();closePiqSettings()">Print</button>
      </div>
    </div>

    <div class="piq-settings-section">
      <h3>Session</h3>
      <div class="piq-settings-row">
        <div class="piq-settings-row-info"><strong>Auto-Logout Timer</strong><span>Inactivity timeout</span></div>
        <select id="piq-timer-select" onchange="piqUpdateTimeout(this.value)" style="padding:7px 12px;background:#141d2e;border:1px solid rgba(255,255,255,0.12);border-radius:8px;color:#e8edf5;font-size:12px;font-family:'Syne',sans-serif;outline:none;">
          <option value="300">5 minutes</option>
          <option value="600" selected>10 minutes</option>
          <option value="900">15 minutes</option>
          <option value="1800">30 minutes</option>
        </select>
      </div>
    </div>

    <div class="piq-settings-section">
      <h3>Security</h3>
      <div style="padding:10px 0;">
        <strong style="font-size:13px;color:#e8edf5;font-family:'Syne',sans-serif;">Change Password</strong>
        <div class="piq-pw-fields">
          <div style="position:relative">
            <input type="password" id="piq-new-pw1" placeholder="New password">
            <button onclick="piqToggleField('piq-new-pw1','piq-eye1')" style="position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:14px;opacity:0.4" tabindex="-1"><span id="piq-eye1">👁</span></button>
          </div>
          <div style="position:relative">
            <input type="password" id="piq-new-pw2" placeholder="Confirm">
            <button onclick="piqToggleField('piq-new-pw2','piq-eye2')" style="position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:14px;opacity:0.4" tabindex="-1"><span id="piq-eye2">👁</span></button>
          </div>
        </div>
        <div style="margin-top:12px;display:flex;align-items:center;gap:12px">
          <button class="piq-action-btn gold" onclick="piqChangePassword()">Update Password</button>
          <span id="piq-pw-msg"></span>
        </div>
      </div>
    </div>
  </div>
</div>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useCallback, useMemo } = React;

// ── Helpers ────────────────────────────────────────────────────────────────
const fmt = n => isFinite(n) ? n.toLocaleString("en-US",{style:"currency",currency:"USD",maximumFractionDigits:0}) : "—";
const fmtPct = n => isFinite(n) ? (n*100).toFixed(1)+"%" : "—";
const fmtYr = n => isFinite(n) && n > 0 && n < 200 ? n.toFixed(1)+" yrs" : "—";
const clamp = (v,mn,mx) => Math.min(mx, Math.max(mn, v));

function calcMortgage(principal, annualRate, termYears) {
  if (principal <= 0) return 0;
  const r = annualRate / 12;
  const n = termYears * 12;
  if (r === 0) return principal / n;
  return principal * (r * Math.pow(1+r,n)) / (Math.pow(1+r,n)-1);
}

// ── Market Data via AI ─────────────────────────────────────────────────────
/* ── AI Market Data Lookup (commented out — requires Anthropic API key)
   To re-enable: uncomment this function and add your API key in the headers
async function fetchMarketData(zip, propertyType) {
  const typeLabel = propertyType === "sfh" ? "single family home"
    : propertyType === "cabin" ? "vacation cabin or short-term rental property"
    : "new construction build";

  const prompt = `You are a real estate data analyst. Provide current market data estimates for ZIP code ${zip} for a ${typeLabel}. 
  
  Return ONLY a valid JSON object with these exact keys (no markdown, no explanation):
  {
    "city": "City, State",
    "medianHomePrice": 350000,
    "medianRentMonthly": 1800,
    "strNightlyRate": 175,
    "strOccupancyRate": 0.62,
    "propertyTaxRate": 0.012,
    "medianHOAMonthly": 0,
    "costOfLivingIndex": 100,
    "marketNotes": "2-3 sentence summary of this market for real estate investors",
    "strViability": "high|medium|low",
    "ltrViability": "high|medium|low"
  }
  
  Use real market knowledge for this ZIP. PropertyTaxRate is annual as decimal (e.g. 1.2% = 0.012). strNightlyRate is average nightly for a typical rental in this area. costOfLivingIndex: 100 = national average.`;

  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": "YOUR_ANTHROPIC_API_KEY_HERE",
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true"
    },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 1000,
      messages: [{ role: "user", content: prompt }]
    })
  });
  const data = await response.json();
  const raw = data.content?.find(b => b.type === "text")?.text || "{}";
  const clean = raw.replace(/```json|```/g,"").trim();
  return JSON.parse(clean);
}
── End of commented AI lookup ── */

// ── Sub-components ─────────────────────────────────────────────────────────
const Tag = ({children, color="gold"}) => {
  const colors = { gold:"var(--gold)", teal:"var(--teal)", red:"var(--red)", blue:"var(--blue)", purple:"var(--purple)" };
  const bgs = { gold:"var(--gold-dim)", teal:"var(--teal-dim)", red:"var(--red-dim)", blue:"var(--blue-dim)", purple:"var(--purple-dim)" };
  return (
    <span style={{
      fontSize:"0.6rem", fontWeight:600, letterSpacing:"0.12em", textTransform:"uppercase",
      color: colors[color], background: bgs[color],
      border:`1px solid ${colors[color]}33`,
      padding:"0.2rem 0.55rem", borderRadius:4, whiteSpace:"nowrap"
    }}>{children}</span>
  );
};

const SectionHead = ({title, accent="#f0b429"}) => (
  <div style={{display:"flex",alignItems:"center",gap:"0.5rem",marginBottom:"1rem"}}>
    <div style={{width:3,height:18,background:accent,borderRadius:2}}/>
    <span style={{fontSize:"0.65rem",letterSpacing:"0.18em",textTransform:"uppercase",color:"var(--muted2)",fontFamily:"var(--font-display)",fontWeight:600}}>{title}</span>
  </div>
);

const Slider = ({label, value, min, max, step, onChange, format, hint, color="var(--gold)"}) => (
  <div style={{marginBottom:"1.1rem"}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:"0.4rem"}}>
      <label style={{fontSize:"0.72rem",color:"var(--muted2)"}}>{label}</label>
      <span style={{fontSize:"0.88rem",fontWeight:600,color:"var(--text)"}}>{format(value)}</span>
    </div>
    <input type="range" min={min} max={max} step={step} value={value}
      style={{"--thumb-color": color, accentColor: color}}
      onChange={e => onChange(Number(e.target.value))} />
    {hint && <div style={{fontSize:"0.63rem",color:"var(--muted)",marginTop:"0.2rem"}}>{hint}</div>}
  </div>
);

const MetricCard = ({label, value, sub, color, rank}) => (
  <div style={{
    background: `linear-gradient(135deg, ${color}18, ${color}08)`,
    border: `1px solid ${color}40`,
    borderRadius:10, padding:"1rem 1.1rem", position:"relative", overflow:"hidden"
  }}>
    {rank && <div style={{position:"absolute",top:"0.5rem",right:"0.6rem",fontSize:"0.55rem",color:`${color}80`,fontWeight:700,letterSpacing:"0.1em"}}># {rank} PRIORITY</div>}
    <div style={{fontSize:"0.62rem",color:"var(--muted2)",letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:"0.35rem"}}>{label}</div>
    <div style={{fontSize:"1.35rem",fontWeight:700,color,fontFamily:"var(--font-display)"}}>{value}</div>
    {sub && <div style={{fontSize:"0.65rem",color:"var(--muted2)",marginTop:"0.2rem"}}>{sub}</div>}
  </div>
);

const PLRow = ({label, value, highlight, positive}) => {
  const color = highlight ? (positive ? "var(--teal)" : "var(--red)") : (value >= 0 ? "var(--text)" : "var(--red)");
  return (
    <div style={{
      display:"flex", justifyContent:"space-between", alignItems:"center",
      padding: highlight ? "0.65rem 0.8rem" : "0.45rem 0.8rem",
      background: highlight ? "rgba(255,255,255,0.04)" : "rgba(255,255,255,0.015)",
      borderRadius:6, border: highlight ? "1px solid rgba(255,255,255,0.08)" : "1px solid transparent",
      marginTop: highlight ? 3 : 0
    }}>
      <span style={{fontSize:"0.72rem",color: highlight ? "var(--text)" : "var(--muted2)",fontWeight: highlight ? 600 : 400}}>{label}</span>
      <span style={{fontSize: highlight ? "0.88rem" : "0.75rem",fontWeight: highlight ? 700 : 500,color}}>
        {value >= 0 ? fmt(value) : "−"+fmt(Math.abs(value))}
      </span>
    </div>
  );
};

const ViabilityBadge = ({label, level}) => {
  const cfg = {high:{c:"var(--teal)",l:"High"}, medium:{c:"var(--gold)",l:"Medium"}, low:{c:"var(--red)",l:"Low"}};
  const v = cfg[level] || cfg["medium"];
  return (
    <div style={{display:"flex",alignItems:"center",gap:"0.5rem"}}>

// ── Main Scenario Calculator ───────────────────────────────────────────────
function calcScenario(inputs, mode, propertyType, market) {
  const {
    purchasePrice, buildLandCost, buildConstructionCost, buildSoftCosts,
    downPct, interestRate, loanTermYears,
    monthlyRent, opExpensePctLTR,
    nightlyRate, occupancyPct, platformFeePct, opExpensePctSTR,
    propertyTaxRate, monthlyHOA, vacancyRateLTR
  } = inputs;

  const totalCost = propertyType === "build"
    ? buildLandCost + buildConstructionCost + buildSoftCosts
    : purchasePrice;

  const down = totalCost * downPct;
  const loan = totalCost - down;
  const monthly$ = calcMortgage(loan, interestRate, loanTermYears);
  const annualDebt = monthly$ * 12;

  let grossRevenue, platformFee = 0, opExpenses, noi;

  if (mode === "ltr") {
    const effectiveRent = monthlyRent * 12 * (1 - vacancyRateLTR);
    grossRevenue = effectiveRent;
    opExpenses = grossRevenue * opExpensePctLTR;
    noi = grossRevenue - opExpenses;
  } else {
    const annualNights = 365 * occupancyPct;
    grossRevenue = nightlyRate * annualNights;
    platformFee = grossRevenue * platformFeePct;
    const netRevenue = grossRevenue - platformFee;
    opExpenses = netRevenue * opExpensePctSTR;
    noi = netRevenue - opExpenses;
  }

  const annualTax = totalCost * propertyTaxRate;
  const annualHOA = monthlyHOA * 12;
  const noiAfterFixed = noi - annualTax - annualHOA;

  const annualCashFlow = noiAfterFixed - annualDebt;
  const monthlyCashFlow = annualCashFlow / 12;
  const cashOnCash = down > 0 ? annualCashFlow / down : 0;
  const capRate = totalCost > 0 ? noiAfterFixed / totalCost : 0;
  const payback = noiAfterFixed > 0 ? totalCost / noiAfterFixed : Infinity;
  const grm = grossRevenue > 0 ? totalCost / grossRevenue : Infinity;

  return {
    totalCost, down, loan, monthly$, annualDebt,
    grossRevenue, platformFee, opExpenses, annualTax, annualHOA,
    noi, noiAfterFixed, annualCashFlow, monthlyCashFlow,
    cashOnCash, capRate, payback, grm
  };
}

                  <MetricCard label="Monthly Cash Flow" value={fmt(r.monthlyCashFlow)} sub={`${fmt(r.annualCashFlow)}/yr`} color={cfC} rank={2} />
                  <MetricCard label="Cap Rate" value={fmtPct(r.capRate)} sub="Unleveraged return" color="var(--blue)" rank={3} />
                  <MetricCard label="Payback Period" value={fmtYr(r.payback)} sub="Total cost ÷ NOI" color="var(--purple)" rank={4} />
                </div>

                {/* Annual P&L */}
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"1rem"}}>
                  <div>
                    <SectionHead title="Annual P&L" accent={accent} />
                    <div style={{display:"grid",gap:"0.3rem"}}>
                      <PLRow label="Gross Revenue" value={r.grossRevenue} />
                      {isSTR && <PLRow label={`Platform Fee (${(platformFeePct*100).toFixed(1)}%)`} value={-r.platformFee} />}
                      {!isSTR && <PLRow label={`Vacancy (${(vacancyRateLTR*100).toFixed(0)}%)`} value={-(monthlyRent*12*vacancyRateLTR)} />}
                      <PLRow label="Operating Expenses" value={-r.opExpenses} />
                      <PLRow label="Net Operating Income" value={r.noi} highlight positive={r.noi>=0} />
                      <PLRow label={`Property Tax (${(propertyTaxRate*100).toFixed(2)}%)`} value={-r.annualTax} />
                      {monthlyHOA > 0 && <PLRow label="HOA" value={-r.annualHOA} />}
                      <PLRow label="NOI After Fixed Costs" value={r.noiAfterFixed} highlight positive={r.noiAfterFixed>=0} />
                      <PLRow label={`Debt Service (${(interestRate*100).toFixed(2)}%, ${loanTermYears}yr)`} value={-r.annualDebt} />
                      <PLRow label="Net Annual Cash Flow" value={r.annualCashFlow} highlight positive={r.annualCashFlow>=0} />
                    </div>
                  </div>

                  {/* Cost Stack + Scenario Table */}
                  <div>
                    <SectionHead title="Investment Stack" accent="var(--gold)" />
                    <div style={{display:"grid",gap:"0.3rem",marginBottom:"1.25rem"}}>
                      {propertyType==="build" ? (
                        <>
                          <CostRow label="Land" value={buildLandCost} total={r.totalCost} color="var(--gold)" />
                          <CostRow label="Construction" value={buildConstructionCost} total={r.totalCost} color="var(--blue)" />
                          <CostRow label="Soft Costs" value={buildSoftCosts} total={r.totalCost} color="var(--muted2)" />
                        </>
                      ) : (
                        <CostRow label="Purchase Price" value={r.totalCost} total={r.totalCost} color="var(--gold)" />
                      )}
                      <div style={{height:1,background:"var(--border)",margin:"0.25rem 0"}}/>
                      <div style={{display:"flex",justifyContent:"space-between",padding:"0.5rem 0.8rem",background:"var(--gold-dim)",borderRadius:6,border:"1px solid var(--gold)30"}}>
                        <span style={{fontSize:"0.7rem",color:"var(--gold)",fontWeight:600}}>Total All-In</span>
                        <span style={{fontSize:"0.82rem",fontWeight:700,color:"var(--gold)"}}>{fmt(r.totalCost)}</span>
                      </div>
                      <div style={{display:"flex",justifyContent:"space-between",padding:"0.4rem 0.8rem",background:"rgba(255,255,255,0.03)",borderRadius:6}}>
                        <span style={{fontSize:"0.68rem",color:"var(--muted2)"}}>Down Payment</span>
                        <span style={{fontSize:"0.75rem",fontWeight:600,color:"var(--text)"}}>{fmt(r.down)}</span>
                      </div>
                      <div style={{display:"flex",justifyContent:"space-between",padding:"0.4rem 0.8rem",background:"rgba(255,255,255,0.03)",borderRadius:6}}>
                        <span style={{fontSize:"0.68rem",color:"var(--muted2)"}}>Loan Amount</span>
                        <span style={{fontSize:"0.75rem",fontWeight:600,color:"var(--text)"}}>{fmt(r.loan)}</span>
                      </div>
                      <div style={{display:"flex",justifyContent:"space-between",padding:"0.4rem 0.8rem",background:"rgba(255,255,255,0.03)",borderRadius:6}}>
                        <span style={{fontSize:"0.68rem",color:"var(--muted2)"}}>Monthly Mortgage</span>
                        <span style={{fontSize:"0.75rem",fontWeight:600,color:"var(--text)"}}>{fmt(r.monthly$)}</span>
                      </div>
                      <div style={{display:"flex",justifyContent:"space-between",padding:"0.4rem 0.8rem",background:"rgba(255,255,255,0.03)",borderRadius:6}}>
                        <span style={{fontSize:"0.68rem",color:"var(--muted2)"}}>GRM</span>
                        <span style={{fontSize:"0.75rem",fontWeight:600,color:"var(--text)"}}>{isFinite(r.grm)&&r.grm>0?r.grm.toFixed(1)+"x":"—"}</span>
                      </div>
                    </div>

                    {/* Scenario Table */}
                    <SectionHead title="Scenario Analysis" accent="var(--purple)" />
                    <div style={{borderRadius:8,overflow:"hidden",border:"1px solid var(--border)"}}>
                      <table style={{width:"100%",borderCollapse:"collapse",fontSize:"0.68rem"}}>
                        <thead>
                          <tr style={{background:"var(--surface2)"}}>
                            <th style={{padding:"0.5rem 0.7rem",color:"var(--muted2)",fontWeight:600,textAlign:"left",letterSpacing:"0.08em",fontSize:"0.6rem",textTransform:"uppercase"}}>Scenario</th>
                            <th style={{padding:"0.5rem 0.5rem",color:"var(--muted2)",fontWeight:600,textAlign:"right",letterSpacing:"0.08em",fontSize:"0.6rem",textTransform:"uppercase"}}>CoC</th>
                            <th style={{padding:"0.5rem 0.5rem",color:"var(--muted2)",fontWeight:600,textAlign:"right",letterSpacing:"0.08em",fontSize:"0.6rem",textTransform:"uppercase"}}>Mo. CF</th>
                            <th style={{padding:"0.5rem 0.5rem",color:"var(--muted2)",fontWeight:600,textAlign:"right",letterSpacing:"0.08em",fontSize:"0.6rem",textTransform:"uppercase"}}>Cap Rate</th>
                          </tr>
                        </thead>
                        <tbody>
                          {[
                            ["Conservative","var(--red)",scenarios.conservative[m]],
                            ["Base Case","var(--gold)",scenarios.base[m]],
                            ["Optimistic","var(--teal)",scenarios.optimistic[m]],
                          ].map(([name,sc,res])=>(
                            <tr key={name} style={{borderTop:"1px solid var(--border)"}}>
                              <td style={{padding:"0.5rem 0.7rem"}}>
                                <div style={{display:"flex",alignItems:"center",gap:"0.4rem"}}>
                                  <div style={{width:5,height:5,borderRadius:"50%",background:sc}}/>
                                  <span style={{color:"var(--text)",fontWeight:name==="Base Case"?600:400}}>{name}</span>
                                </div>
                              </td>
                              <td style={{padding:"0.5rem 0.5rem",textAlign:"right",color:cocColor(res.cashOnCash),fontWeight:600}}>{fmtPct(res.cashOnCash)}</td>
                              <td style={{padding:"0.5rem 0.5rem",textAlign:"right",color:cfColor(res.monthlyCashFlow),fontWeight:600}}>{fmt(res.monthlyCashFlow)}</td>
                              <td style={{padding:"0.5rem 0.5rem",textAlign:"right",color:"var(--blue)",fontWeight:600}}>{fmtPct(res.capRate)}</td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  </div>
                </div>
              </div>
            );
          })}

          {/* Compare Both summary bar */}
          {mode === "both" && (
            <div className="fadeIn" style={{
              background:"linear-gradient(135deg,var(--teal-dim),var(--gold-dim))",
              border:"1px solid var(--border2)", borderRadius:10,
              padding:"1rem 1.25rem", marginTop:"0.5rem"
            }}>
              <SectionHead title="Side-by-Side Verdict" accent="var(--teal)" />
              <div style={{display:"grid",gridTemplateColumns:"1fr auto 1fr",gap:"1rem",alignItems:"center"}}>
                <VerdictSide label="Long-Term Rental" r={baseResults.ltr} color="var(--teal)" />
                <div style={{textAlign:"center"}}>
                  <div style={{fontSize:"0.6rem",color:"var(--muted)",letterSpacing:"0.15em",textTransform:"uppercase",marginBottom:"0.3rem"}}>vs</div>
                  <WinnerBadge ltr={baseResults.ltr} str={baseResults.str} />
                </div>
                <VerdictSide label="Short-Term Rental" r={baseResults.str} color="var(--gold)" right />
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

const MarketStat = ({label, value}) => (
  <div>
    <div style={{fontSize:"0.58rem",color:"var(--muted)",letterSpacing:"0.1em",textTransform:"uppercase"}}>{label}</div>
    <div style={{fontSize:"0.82rem",fontWeight:700,color:"var(--text)",fontFamily:"var(--font-display)"}}>{value}</div>
  </div>
);

const CostRow = ({label, value, total, color}) => {
  const pct = total > 0 ? value/total : 0;
  return (
    <div style={{padding:"0.45rem 0.8rem",background:"rgba(255,255,255,0.02)",borderRadius:6,border:"1px solid var(--border)"}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:"0.3rem"}}>
        <span style={{fontSize:"0.68rem",color:"var(--muted2)"}}>{label}</span>
        <span style={{fontSize:"0.75rem",fontWeight:600,color:"var(--text)"}}>{fmt(value)}</span>
      </div>
      <div style={{height:2,background:"rgba(255,255,255,0.06)",borderRadius:2}}>
        <div style={{height:"100%",width:(pct*100)+"%",background:color,borderRadius:2,transition:"width 0.4s ease"}}/>
      </div>
    </div>
  );
};

const VerdictSide = ({label, r, color, right}) => (
  <div style={{textAlign: right?"right":"left"}}>
    <div style={{fontSize:"0.65rem",color,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:"0.4rem"}}>{label}</div>
    <div style={{fontSize:"1.1rem",fontWeight:800,fontFamily:"var(--font-display)",color}}>{fmtPct(r.cashOnCash)}</div>
    <div style={{fontSize:"0.68rem",color:"var(--muted2)"}}>Cash-on-Cash</div>
    <div style={{fontSize:"0.82rem",fontWeight:700,color:"var(--text)",marginTop:"0.25rem"}}>{fmt(r.monthlyCashFlow)}<span style={{fontSize:"0.6rem",color:"var(--muted2)"}}>/mo</span></div>
  </div>
);

const WinnerBadge = ({ltr, str}) => {
  const ltrWins = ltr.cashOnCash >= str.cashOnCash;
  const tied = Math.abs(ltr.cashOnCash - str.cashOnCash) < 0.005;
  if (tied) return <div style={{fontSize:"0.65rem",color:"var(--muted2)"}}>Tied</div>;
  return (
    <div style={{
      background: ltrWins ? "var(--teal-dim)" : "var(--gold-dim)",
      border:`1px solid ${ltrWins?"var(--teal)":"var(--gold)"}40`,
      borderRadius:8, padding:"0.4rem 0.7rem", fontSize:"0.62rem",
      color: ltrWins ? "var(--teal)" : "var(--gold)", fontWeight:700,
      letterSpacing:"0.08em", textTransform:"uppercase", textAlign:"center"
    }}>
      {ltrWins ? "LTR Wins" : "STR Wins"}
    </div>
  );
};

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>

<script>
// ── PROPIQ AUTH & SESSION ──────────────────────────────────────────────────────
const PIQ_DEFAULT_PASS = 'propiq2024';
const PIQ_PASS_KEY = 'propiq_pass_hash';

async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

async function piqLogin() {
  const val = document.getElementById('piq-pw-input').value;
  const hash = await sha256(val);
  let stored = localStorage.getItem(PIQ_PASS_KEY);
  if (!stored) { stored = await sha256(PIQ_DEFAULT_PASS); localStorage.setItem(PIQ_PASS_KEY, stored); }
  if (hash === stored) {
    document.getElementById('propiq-login').style.display = 'none';
    const topbar = document.getElementById('propiq-topbar');
    topbar.style.display = 'flex';
    document.getElementById('root').classList.add('with-topbar');
    sessionStorage.setItem('piq_auth','1');
    piqStartTimer();
  } else {
    const err = document.getElementById('piq-error');
    err.style.display = 'block';
    document.getElementById('piq-pw-input').value = '';
    setTimeout(() => err.style.display = 'none', 2500);
  }
}

function piqToggleEye() {
  const input = document.getElementById('piq-pw-input');
  const icon = document.getElementById('piq-eye-icon');
  if(input.type==='password'){input.type='text';icon.textContent='🙈';}
  else{input.type='password';icon.textContent='👁';}
}

function piqToggleField(inputId, iconId) {
  const input = document.getElementById(inputId);
  const icon = document.getElementById(iconId);
  if(input.type==='password'){input.type='text';icon.textContent='🙈';}
  else{input.type='password';icon.textContent='👁';}
}

function piqLogout() {
  document.getElementById('propiq-timeout-warning').style.display = 'none';
  document.getElementById('propiq-topbar').style.display = 'none';
  document.getElementById('root').classList.remove('with-topbar');
  document.getElementById('propiq-login').style.display = 'flex';
  document.getElementById('piq-pw-input').value = '';
  sessionStorage.removeItem('piq_auth');
  piqTimeLeft = 600; clearInterval(piqTimerInterval);
}

function piqSaveAndLogout() { piqLogout(); }

async function piqChangePassword() {
  const p1 = document.getElementById('piq-new-pw1').value;
  const p2 = document.getElementById('piq-new-pw2').value;
  const msg = document.getElementById('piq-pw-msg');
  if(!p1||p1!==p2){msg.style.color='#f56565';msg.textContent='Passwords do not match.';return;}
  const hash = await sha256(p1);
  localStorage.setItem(PIQ_PASS_KEY, hash);
  msg.style.color='#00d4aa';msg.textContent='✓ Password updated.';
  document.getElementById('piq-new-pw1').value='';
  document.getElementById('piq-new-pw2').value='';
  setTimeout(()=>msg.textContent='',3000);
}

// ── TIMER ─────────────────────────────────────────────────────────────────────
let piqTimeLeft = 600, piqTimerInterval;

function piqStartTimer() {
  clearInterval(piqTimerInterval);
  piqTimerInterval = setInterval(() => {
    piqTimeLeft--;
    piqUpdateTimerDisplay();
    if(piqTimeLeft===60) document.getElementById('propiq-timeout-warning').style.display='block';
    if(piqTimeLeft<=0){clearInterval(piqTimerInterval);piqLogout();}
  },1000);
}

function piqResetTimer() {
  piqTimeLeft = 600;
  document.getElementById('propiq-timeout-warning').style.display='none';
  clearInterval(piqTimerInterval);
  piqStartTimer();
}

function piqUpdateTimerDisplay() {
  const m=Math.floor(piqTimeLeft/60),s=piqTimeLeft%60;
  const el=document.getElementById('piq-timer-display');
  if(el) el.textContent=m+':'+(s<10?'0':'')+s;
  const dot=document.getElementById('piq-timer-dot');
  if(dot) dot.style.background=piqTimeLeft>120?'#00d4aa':piqTimeLeft>60?'#f0b429':'#f56565';
  const cd=document.getElementById('piq-countdown');
  if(cd&&document.getElementById('propiq-timeout-warning').style.display!=='none') cd.textContent=piqTimeLeft;
}

function piqUpdateTimeout(val){piqTimeLeft=parseInt(val);piqResetTimer();}

['mousemove','keydown','click','scroll'].forEach(e=>document.addEventListener(e,()=>{
  if(sessionStorage.getItem('piq_auth')==='1') piqResetTimer();
}));

// ── SETTINGS ──────────────────────────────────────────────────────────────────
function openPiqSettings(){document.getElementById('propiq-settings').style.display='flex';}
function closePiqSettings(){document.getElementById('propiq-settings').style.display='none';}

// ── AUTO-RESTORE SESSION ──────────────────────────────────────────────────────
(async function init() {
  // Set default password if not set
  if(!localStorage.getItem(PIQ_PASS_KEY)){
    localStorage.setItem(PIQ_PASS_KEY, await sha256(PIQ_DEFAULT_PASS));
  }
  // Restore session if still active
  if(sessionStorage.getItem('piq_auth')==='1'){
    document.getElementById('propiq-login').style.display='none';
    document.getElementById('propiq-topbar').style.display='flex';
    document.getElementById('root').classList.add('with-topbar');
    piqStartTimer();
  }
  // Enter on password field
  document.getElementById('piq-pw-input').addEventListener('keydown', e=>{
    if(e.key==='Enter') piqLogin();
  });
})();
</script>
</body>
</html>
