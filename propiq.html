<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PropIQ · Rental Investment Analyzer</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #080c14;
      --surface: #0e1521;
      --surface2: #141d2e;
      --border: rgba(255,255,255,0.07);
      --border2: rgba(255,255,255,0.12);
      --text: #e8edf5;
      --muted: #4a5568;
      --muted2: #718096;
      --gold: #f0b429;
      --gold-dim: rgba(240,180,41,0.15);
      --teal: #00d4aa;
      --teal-dim: rgba(0,212,170,0.12);
      --red: #f56565;
      --red-dim: rgba(245,101,101,0.12);
      --blue: #4299e1;
      --blue-dim: rgba(66,153,225,0.12);
      --purple: #9f7aea;
      --purple-dim: rgba(159,122,234,0.12);
      --font-display: 'Syne', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }
    body { background: var(--bg); color: var(--text); font-family: var(--font-mono); overflow-x: hidden; }
    input[type=range] {
      -webkit-appearance: none; appearance: none;
      width: 100%; height: 2px; border-radius: 2px;
      background: rgba(255,255,255,0.08); outline: none; cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 14px; height: 14px;
      border-radius: 50%; background: var(--gold);
      border: 2px solid var(--bg); box-shadow: 0 0 10px rgba(240,180,41,0.6);
      cursor: pointer; transition: transform 0.15s;
    }
    input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.2); }
    input[type=range]::-moz-range-thumb {
      width: 14px; height: 14px; border-radius: 50%;
      background: var(--gold); border: 2px solid var(--bg); cursor: pointer;
    }
    input[type=text], input[type=number] {
      background: var(--surface2); border: 1px solid var(--border2);
      color: var(--text); font-family: var(--font-mono); font-size: 0.85rem;
      padding: 0.6rem 0.9rem; border-radius: 6px; outline: none; width: 100%;
      transition: border-color 0.2s;
    }
    input[type=text]:focus, input[type=number]:focus { border-color: var(--gold); }
    button { cursor: pointer; font-family: var(--font-mono); }
    ::-webkit-scrollbar { width: 3px; height: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }
    .fadeIn { animation: fadeIn 0.4s ease forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .pulse { animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
    @media (max-width: 900px) {
      .main-layout { flex-direction: column !important; }
      .left-panel { width: 100% !important; border-right: none !important; border-bottom: 1px solid var(--border) !important; max-height: none !important; }
      .right-panel { max-height: none !important; }
      .scenario-grid { grid-template-columns: 1fr !important; }
      .metrics-row { grid-template-columns: 1fr 1fr !important; }
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useCallback, useMemo } = React;

// ── Helpers ────────────────────────────────────────────────────────────────
const fmt = n => isFinite(n) ? n.toLocaleString("en-US",{style:"currency",currency:"USD",maximumFractionDigits:0}) : "—";
const fmtPct = n => isFinite(n) ? (n*100).toFixed(1)+"%" : "—";
const fmtYr = n => isFinite(n) && n > 0 && n < 200 ? n.toFixed(1)+" yrs" : "—";
const clamp = (v,mn,mx) => Math.min(mx, Math.max(mn, v));

function calcMortgage(principal, annualRate, termYears) {
  if (principal <= 0) return 0;
  const r = annualRate / 12;
  const n = termYears * 12;
  if (r === 0) return principal / n;
  return principal * (r * Math.pow(1+r,n)) / (Math.pow(1+r,n)-1);
}

// ── Market Data via AI ─────────────────────────────────────────────────────
async function fetchMarketData(zip, propertyType) {
  const typeLabel = propertyType === "sfh" ? "single family home"
    : propertyType === "cabin" ? "vacation cabin or short-term rental property"
    : "new construction build";

  const prompt = `You are a real estate data analyst. Provide current market data estimates for ZIP code ${zip} for a ${typeLabel}. 
  
  Return ONLY a valid JSON object with these exact keys (no markdown, no explanation):
  {
    "city": "City, State",
    "medianHomePrice": 350000,
    "medianRentMonthly": 1800,
    "strNightlyRate": 175,
    "strOccupancyRate": 0.62,
    "propertyTaxRate": 0.012,
    "medianHOAMonthly": 0,
    "costOfLivingIndex": 100,
    "marketNotes": "2-3 sentence summary of this market for real estate investors",
    "strViability": "high|medium|low",
    "ltrViability": "high|medium|low"
  }
  
  Use real market knowledge for this ZIP. PropertyTaxRate is annual as decimal (e.g. 1.2% = 0.012). strNightlyRate is average nightly for a typical rental in this area. costOfLivingIndex: 100 = national average.`;

  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 1000,
      messages: [{ role: "user", content: prompt }]
    })
  });
  const data = await response.json();
  const raw = data.content?.find(b => b.type === "text")?.text || "{}";
  const clean = raw.replace(/```json|```/g,"").trim();
  return JSON.parse(clean);
}

// ── Sub-components ─────────────────────────────────────────────────────────
const Tag = ({children, color="gold"}) => {
  const colors = { gold:"var(--gold)", teal:"var(--teal)", red:"var(--red)", blue:"var(--blue)", purple:"var(--purple)" };
  const bgs = { gold:"var(--gold-dim)", teal:"var(--teal-dim)", red:"var(--red-dim)", blue:"var(--blue-dim)", purple:"var(--purple-dim)" };
  return (
    <span style={{
      fontSize:"0.6rem", fontWeight:600, letterSpacing:"0.12em", textTransform:"uppercase",
      color: colors[color], background: bgs[color],
      border:`1px solid ${colors[color]}33`,
      padding:"0.2rem 0.55rem", borderRadius:4, whiteSpace:"nowrap"
    }}>{children}</span>
  );
};

const SectionHead = ({title, accent="#f0b429"}) => (
  <div style={{display:"flex",alignItems:"center",gap:"0.5rem",marginBottom:"1rem"}}>
    <div style={{width:3,height:18,background:accent,borderRadius:2}}/>
    <span style={{fontSize:"0.65rem",letterSpacing:"0.18em",textTransform:"uppercase",color:"var(--muted2)",fontFamily:"var(--font-display)",fontWeight:600}}>{title}</span>
  </div>
);

const Slider = ({label, value, min, max, step, onChange, format, hint, color="var(--gold)"}) => (
  <div style={{marginBottom:"1.1rem"}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:"0.4rem"}}>
      <label style={{fontSize:"0.72rem",color:"var(--muted2)"}}>{label}</label>
      <span style={{fontSize:"0.88rem",fontWeight:600,color:"var(--text)"}}>{format(value)}</span>
    </div>
    <input type="range" min={min} max={max} step={step} value={value}
      style={{"--thumb-color": color, accentColor: color}}
      onChange={e => onChange(Number(e.target.value))} />
    {hint && <div style={{fontSize:"0.63rem",color:"var(--muted)",marginTop:"0.2rem"}}>{hint}</div>}
  </div>
);

const MetricCard = ({label, value, sub, color, rank}) => (
  <div style={{
    background: `linear-gradient(135deg, ${color}18, ${color}08)`,
    border: `1px solid ${color}40`,
    borderRadius:10, padding:"1rem 1.1rem", position:"relative", overflow:"hidden"
  }}>
    {rank && <div style={{position:"absolute",top:"0.5rem",right:"0.6rem",fontSize:"0.55rem",color:`${color}80`,fontWeight:700,letterSpacing:"0.1em"}}># {rank} PRIORITY</div>}
    <div style={{fontSize:"0.62rem",color:"var(--muted2)",letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:"0.35rem"}}>{label}</div>
    <div style={{fontSize:"1.35rem",fontWeight:700,color,fontFamily:"var(--font-display)"}}>{value}</div>
    {sub && <div style={{fontSize:"0.65rem",color:"var(--muted2)",marginTop:"0.2rem"}}>{sub}</div>}
  </div>
);

const PLRow = ({label, value, highlight, positive}) => {
  const color = highlight ? (positive ? "var(--teal)" : "var(--red)") : (value >= 0 ? "var(--text)" : "var(--red)");
  return (
    <div style={{
      display:"flex", justifyContent:"space-between", alignItems:"center",
      padding: highlight ? "0.65rem 0.8rem" : "0.45rem 0.8rem",
      background: highlight ? "rgba(255,255,255,0.04)" : "rgba(255,255,255,0.015)",
      borderRadius:6, border: highlight ? "1px solid rgba(255,255,255,0.08)" : "1px solid transparent",
      marginTop: highlight ? 3 : 0
    }}>
      <span style={{fontSize:"0.72rem",color: highlight ? "var(--text)" : "var(--muted2)",fontWeight: highlight ? 600 : 400}}>{label}</span>
      <span style={{fontSize: highlight ? "0.88rem" : "0.75rem",fontWeight: highlight ? 700 : 500,color}}>
        {value >= 0 ? fmt(value) : "−"+fmt(Math.abs(value))}
      </span>
    </div>
  );
};

const ViabilityBadge = ({label, level}) => {
  const cfg = {high:{c:"var(--teal)",l:"High"}, medium:{c:"var(--gold)",l:"Medium"}, low:{c:"var(--red)",l:"Low"}};
  const v = cfg[level] || cfg["medium"];
  return (
    <div style={{display:"flex",alignItems:"center",gap:"0.5rem"}}>
      <div style={{width:6,height:6,borderRadius:"50%",background:v.c,boxShadow:`0 0 6px ${v.c}`}}/>
      <span style={{fontSize:"0.65rem",color:"var(--muted2)"}}>{label}</span>
      <span style={{fontSize:"0.65rem",color:v.c,fontWeight:600}}>{v.l}</span>
    </div>
  );
};

// ── Main Scenario Calculator ───────────────────────────────────────────────
function calcScenario(inputs, mode, propertyType, market) {
  const {
    purchasePrice, buildLandCost, buildConstructionCost, buildSoftCosts,
    downPct, interestRate, loanTermYears,
    monthlyRent, opExpensePctLTR,
    nightlyRate, occupancyPct, platformFeePct, opExpensePctSTR,
    propertyTaxRate, monthlyHOA, vacancyRateLTR
  } = inputs;

  const totalCost = propertyType === "build"
    ? buildLandCost + buildConstructionCost + buildSoftCosts
    : purchasePrice;

  const down = totalCost * downPct;
  const loan = totalCost - down;
  const monthly$ = calcMortgage(loan, interestRate, loanTermYears);
  const annualDebt = monthly$ * 12;

  let grossRevenue, platformFee = 0, opExpenses, noi;

  if (mode === "ltr") {
    const effectiveRent = monthlyRent * 12 * (1 - vacancyRateLTR);
    grossRevenue = effectiveRent;
    opExpenses = grossRevenue * opExpensePctLTR;
    noi = grossRevenue - opExpenses;
  } else {
    const annualNights = 365 * occupancyPct;
    grossRevenue = nightlyRate * annualNights;
    platformFee = grossRevenue * platformFeePct;
    const netRevenue = grossRevenue - platformFee;
    opExpenses = netRevenue * opExpensePctSTR;
    noi = netRevenue - opExpenses;
  }

  const annualTax = totalCost * propertyTaxRate;
  const annualHOA = monthlyHOA * 12;
  const noiAfterFixed = noi - annualTax - annualHOA;

  const annualCashFlow = noiAfterFixed - annualDebt;
  const monthlyCashFlow = annualCashFlow / 12;
  const cashOnCash = down > 0 ? annualCashFlow / down : 0;
  const capRate = totalCost > 0 ? noiAfterFixed / totalCost : 0;
  const payback = noiAfterFixed > 0 ? totalCost / noiAfterFixed : Infinity;
  const grm = grossRevenue > 0 ? totalCost / grossRevenue : Infinity;

  return {
    totalCost, down, loan, monthly$, annualDebt,
    grossRevenue, platformFee, opExpenses, annualTax, annualHOA,
    noi, noiAfterFixed, annualCashFlow, monthlyCashFlow,
    cashOnCash, capRate, payback, grm
  };
}

// ── App ────────────────────────────────────────────────────────────────────
function App() {
  const [zip, setZip] = useState("");
  const [zipInput, setZipInput] = useState("");
  const [market, setMarket] = useState(null);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");
  const [propertyType, setPropertyType] = useState("sfh"); // sfh | cabin | build
  const [mode, setMode] = useState("ltr"); // ltr | str | both
  const [activeTab, setActiveTab] = useState("inputs"); // inputs | results (mobile)

  // Shared inputs
  const [purchasePrice, setPurchasePrice] = useState(350000);
  const [downPct, setDownPct] = useState(0.20);
  const [interestRate, setInterestRate] = useState(0.075);
  const [loanTermYears, setLoanTermYears] = useState(30);
  const [propertyTaxRate, setPropertyTaxRate] = useState(0.012);
  const [monthlyHOA, setMonthlyHOA] = useState(0);

  // Build inputs
  const [buildLandCost, setBuildLandCost] = useState(80000);
  const [buildConstructionCost, setBuildConstructionCost] = useState(250000);
  const [buildSoftCosts, setBuildSoftCosts] = useState(40000);

  // LTR
  const [monthlyRent, setMonthlyRent] = useState(1800);
  const [vacancyRateLTR, setVacancyRateLTR] = useState(0.05);
  const [opExpensePctLTR, setOpExpensePctLTR] = useState(0.35);

  // STR
  const [nightlyRate, setNightlyRate] = useState(175);
  const [occupancyPct, setOccupancyPct] = useState(0.62);
  const [platformFeePct, setPlatformFeePct] = useState(0.03);
  const [opExpensePctSTR, setOpExpensePctSTR] = useState(0.35);

  const inputs = {
    purchasePrice, buildLandCost, buildConstructionCost, buildSoftCosts,
    downPct, interestRate, loanTermYears,
    monthlyRent, opExpensePctLTR, vacancyRateLTR,
    nightlyRate, occupancyPct, platformFeePct, opExpensePctSTR,
    propertyTaxRate, monthlyHOA
  };

  // Scenarios: conservative / base / optimistic
  const makeScenarioInputs = (variant) => {
    if (variant === "base") return inputs;
    if (variant === "conservative") return {
      ...inputs,
      monthlyRent: Math.round(monthlyRent * 0.88),
      nightlyRate: Math.round(nightlyRate * 0.82),
      occupancyPct: Math.max(0.3, occupancyPct - 0.15),
      vacancyRateLTR: Math.min(0.15, vacancyRateLTR + 0.05),
      opExpensePctLTR: Math.min(0.55, opExpensePctLTR + 0.05),
      opExpensePctSTR: Math.min(0.55, opExpensePctSTR + 0.05),
    };
    return {
      ...inputs,
      monthlyRent: Math.round(monthlyRent * 1.12),
      nightlyRate: Math.round(nightlyRate * 1.15),
      occupancyPct: Math.min(0.92, occupancyPct + 0.12),
      vacancyRateLTR: Math.max(0.01, vacancyRateLTR - 0.02),
      opExpensePctLTR: Math.max(0.18, opExpensePctLTR - 0.04),
      opExpensePctSTR: Math.max(0.18, opExpensePctSTR - 0.04),
    };
  };

  const scenarios = useMemo(() => ({
    conservative: {
      ltr: calcScenario(makeScenarioInputs("conservative"), "ltr", propertyType, market),
      str: calcScenario(makeScenarioInputs("conservative"), "str", propertyType, market),
    },
    base: {
      ltr: calcScenario(makeScenarioInputs("base"), "ltr", propertyType, market),
      str: calcScenario(makeScenarioInputs("base"), "str", propertyType, market),
    },
    optimistic: {
      ltr: calcScenario(makeScenarioInputs("optimistic"), "ltr", propertyType, market),
      str: calcScenario(makeScenarioInputs("optimistic"), "str", propertyType, market),
    },
  }), [inputs, propertyType, market]);

  const baseResults = { ltr: scenarios.base.ltr, str: scenarios.base.str };

  async function handleLookup() {
    const z = zipInput.trim();
    if (!/^\d{5}$/.test(z)) { setError("Please enter a valid 5-digit ZIP code."); return; }
    setError(""); setLoading(true);
    try {
      const data = await fetchMarketData(z, propertyType);
      setMarket(data);
      setZip(z);
      // Auto-populate sliders with market data
      if (data.medianHomePrice) setPurchasePrice(data.medianHomePrice);
      if (data.medianRentMonthly) setMonthlyRent(data.medianRentMonthly);
      if (data.strNightlyRate) setNightlyRate(data.strNightlyRate);
      if (data.strOccupancyRate) setOccupancyPct(data.strOccupancyRate);
      if (data.propertyTaxRate) setPropertyTaxRate(data.propertyTaxRate);
      if (data.medianHOAMonthly) setMonthlyHOA(data.medianHOAMonthly);
    } catch(e) {
      setError("Could not fetch market data. Check ZIP and try again.");
    }
    setLoading(false);
  }

  const cocColor = (v) => v >= 0.08 ? "var(--teal)" : v >= 0.04 ? "var(--gold)" : v >= 0 ? "var(--muted2)" : "var(--red)";
  const cfColor = (v) => v >= 200 ? "var(--teal)" : v >= 0 ? "var(--gold)" : "var(--red)";

  const showMode = mode === "both" ? ["ltr","str"] : [mode];

  return (
    <div style={{minHeight:"100vh",background:"var(--bg)",display:"flex",flexDirection:"column"}}>

      {/* ── Top Bar ── */}
      <div style={{
        display:"flex",alignItems:"center",justifyContent:"space-between",
        padding:"1rem 1.5rem", borderBottom:"1px solid var(--border)",
        background:"rgba(14,21,33,0.95)", backdropFilter:"blur(10px)",
        position:"sticky",top:0,zIndex:100
      }}>
        <div style={{display:"flex",alignItems:"center",gap:"0.75rem"}}>
          <div style={{
            width:32,height:32,borderRadius:8,
            background:"linear-gradient(135deg,var(--gold),#e8820c)",
            display:"flex",alignItems:"center",justifyContent:"center",
            fontSize:"0.9rem",fontWeight:900,fontFamily:"var(--font-display)",color:"#080c14"
          }}>P</div>
          <div>
            <div style={{fontSize:"1rem",fontWeight:800,fontFamily:"var(--font-display)",color:"var(--text)",lineHeight:1}}>PropIQ</div>
            <div style={{fontSize:"0.58rem",color:"var(--muted)",letterSpacing:"0.12em",textTransform:"uppercase"}}>Rental Investment Analyzer</div>
          </div>
        </div>

        {/* ZIP Lookup */}
        <div style={{display:"flex",gap:"0.5rem",alignItems:"center"}}>
          <input type="text" placeholder="Enter ZIP code" value={zipInput}
            maxLength={5}
            onChange={e => setZipInput(e.target.value)}
            onKeyDown={e => e.key==="Enter" && handleLookup()}
            style={{width:130, fontSize:"0.8rem"}} />
          <button onClick={handleLookup} disabled={loading} style={{
            background: loading ? "var(--muted)" : "var(--gold)",
            color:"#080c14", border:"none", borderRadius:6,
            padding:"0.6rem 1rem", fontSize:"0.72rem", fontWeight:700,
            letterSpacing:"0.08em", textTransform:"uppercase",
            fontFamily:"var(--font-mono)", transition:"all 0.2s",
            opacity: loading ? 0.7 : 1
          }}>
            {loading ? "..." : "Analyze"}
          </button>
        </div>
      </div>

      {error && (
        <div style={{background:"var(--red-dim)",borderBottom:"1px solid var(--red)33",padding:"0.6rem 1.5rem",fontSize:"0.72rem",color:"var(--red)"}}>
          ⚠ {error}
        </div>
      )}

      {/* ── Market Banner ── */}
      {market && (
        <div className="fadeIn" style={{
          background:"linear-gradient(90deg,rgba(240,180,41,0.08),rgba(0,212,170,0.06))",
          borderBottom:"1px solid var(--border)", padding:"0.9rem 1.5rem",
          display:"flex",flexWrap:"wrap",alignItems:"center",gap:"1.5rem"
        }}>
          <div>
            <div style={{fontSize:"0.65rem",color:"var(--muted)",letterSpacing:"0.1em",textTransform:"uppercase"}}>Market</div>
            <div style={{fontSize:"0.95rem",fontWeight:700,fontFamily:"var(--font-display)",color:"var(--gold)"}}>{market.city} · {zip}</div>
          </div>
          <div style={{height:28,width:1,background:"var(--border)"}}/>
          <div style={{display:"flex",gap:"1.5rem",flexWrap:"wrap"}}>
            <MarketStat label="Median Price" value={fmt(market.medianHomePrice)} />
            <MarketStat label="Median Rent/mo" value={fmt(market.medianRentMonthly)} />
            <MarketStat label="STR Nightly" value={fmt(market.strNightlyRate)} />
            <MarketStat label="STR Occupancy" value={fmtPct(market.strOccupancyRate)} />
            <MarketStat label="Prop Tax Rate" value={fmtPct(market.propertyTaxRate)} />
            <MarketStat label="COL Index" value={market.costOfLivingIndex} />
          </div>
          <div style={{height:28,width:1,background:"var(--border)"}}/>
          <div style={{display:"flex",gap:"1rem"}}>
            <ViabilityBadge label="LTR" level={market.ltrViability} />
            <ViabilityBadge label="STR" level={market.strViability} />
          </div>
          {market.marketNotes && (
            <div style={{fontSize:"0.65rem",color:"var(--muted2)",maxWidth:400,lineHeight:1.6,borderLeft:"2px solid var(--border2)",paddingLeft:"0.75rem"}}>
              {market.marketNotes}
            </div>
          )}
        </div>
      )}

      {/* ── Mode + Type Controls ── */}
      <div style={{display:"flex",gap:"1rem",padding:"0.9rem 1.5rem",borderBottom:"1px solid var(--border)",flexWrap:"wrap",alignItems:"center",background:"var(--surface)"}}>
        <div style={{display:"flex",gap:"0.25rem",background:"var(--bg)",borderRadius:8,padding:"0.25rem",border:"1px solid var(--border)"}}>
          {[["sfh","Single Family"],["cabin","Cabin / STR"],["build","Land + Build"]].map(([v,l]) => (
            <button key={v} onClick={()=>setPropertyType(v)} style={{
              padding:"0.4rem 0.75rem",borderRadius:6,border:"none",fontSize:"0.68rem",
              fontFamily:"var(--font-mono)",fontWeight:600,letterSpacing:"0.06em",
              background: propertyType===v ? "var(--gold)" : "transparent",
              color: propertyType===v ? "#080c14" : "var(--muted2)",
              transition:"all 0.2s"
            }}>{l}</button>
          ))}
        </div>

        <div style={{display:"flex",gap:"0.25rem",background:"var(--bg)",borderRadius:8,padding:"0.25rem",border:"1px solid var(--border)"}}>
          {[["ltr","Long-Term Rental"],["str","Short-Term Rental"],["both","Compare Both"]].map(([v,l]) => (
            <button key={v} onClick={()=>setMode(v)} style={{
              padding:"0.4rem 0.75rem",borderRadius:6,border:"none",fontSize:"0.68rem",
              fontFamily:"var(--font-mono)",fontWeight:600,letterSpacing:"0.06em",
              background: mode===v ? "var(--teal)" : "transparent",
              color: mode===v ? "#080c14" : "var(--muted2)",
              transition:"all 0.2s"
            }}>{l}</button>
          ))}
        </div>

        <div style={{marginLeft:"auto",fontSize:"0.62rem",color:"var(--muted)",letterSpacing:"0.08em"}}>
          {!zip ? "↑ Enter a ZIP code to load market data" : `Loaded: ${zip} · Sliders auto-populated`}
        </div>
      </div>

      {/* ── Main Layout ── */}
      <div className="main-layout" style={{display:"flex",flex:1,minHeight:0}}>

        {/* LEFT: Inputs */}
        <div className="left-panel" style={{
          width:380, minWidth:340, flexShrink:0,
          borderRight:"1px solid var(--border)",
          overflowY:"auto", padding:"1.5rem",
          background:"var(--surface)"
        }}>

          {/* Property Cost */}
          {propertyType === "build" ? (
            <>
              <SectionHead title="Land + Build Cost" accent="var(--gold)" />
              <Slider label="Land Cost" value={buildLandCost} min={10000} max={500000} step={5000} onChange={setBuildLandCost} format={fmt} hint="Raw or cleared land purchase price" />
              <Slider label="Construction Cost" value={buildConstructionCost} min={50000} max={2000000} step={10000} onChange={setBuildConstructionCost} format={fmt} hint="Turnkey build estimate" />
              <Slider label="Soft Costs" value={buildSoftCosts} min={0} max={150000} step={5000} onChange={setBuildSoftCosts} format={fmt} hint="Permits, site prep, furnishings, contingency" />
              <div style={{background:"var(--gold-dim)",border:"1px solid var(--gold)30",borderRadius:8,padding:"0.7rem 0.9rem",fontSize:"0.68rem",color:"var(--gold)",marginBottom:"1.5rem"}}>
                Total All-In: <strong>{fmt(buildLandCost+buildConstructionCost+buildSoftCosts)}</strong>
              </div>
            </>
          ) : (
            <>
              <SectionHead title="Acquisition" accent="var(--gold)" />
              <Slider label="Purchase Price" value={purchasePrice} min={50000} max={3000000} step={5000} onChange={setPurchasePrice} format={fmt}
                hint={market ? `Market median: ${fmt(market.medianHomePrice)}` : "Enter ZIP to load market data"} />
            </>
          )}

          {/* Financing */}
          <SectionHead title="Financing" accent="var(--blue)" />
          <Slider label="Down Payment" value={downPct} min={0.03} max={0.50} step={0.01} onChange={setDownPct} format={v=>(v*100).toFixed(0)+"%"}
            hint={`= ${fmt((propertyType==="build"?buildLandCost+buildConstructionCost+buildSoftCosts:purchasePrice)*downPct)} cash out of pocket`}
            color="var(--blue)" />
          <Slider label="Interest Rate" value={interestRate} min={0.04} max={0.12} step={0.0025} onChange={setInterestRate} format={v=>(v*100).toFixed(2)+"%"} hint="Investment property rates typically +0.5–1% vs primary" color="var(--blue)" />
          <Slider label="Loan Term" value={loanTermYears} min={10} max={30} step={5} onChange={setLoanTermYears} format={v=>v+" yrs"} color="var(--blue)" />

          {/* Fixed Costs */}
          <SectionHead title="Fixed Property Costs" accent="var(--purple)" />
          <Slider label="Property Tax Rate" value={propertyTaxRate} min={0.003} max={0.03} step={0.001} onChange={setPropertyTaxRate}
            format={v=>(v*100).toFixed(2)+"%"} hint={market ? `Market estimate: ${(market.propertyTaxRate*100).toFixed(2)}%` : "Annual % of property value"}
            color="var(--purple)" />
          <Slider label="HOA / Month" value={monthlyHOA} min={0} max={1000} step={25} onChange={setMonthlyHOA} format={fmt}
            hint={market && market.medianHOAMonthly > 0 ? `Market avg: ${fmt(market.medianHOAMonthly)}/mo` : "Enter 0 if no HOA"}
            color="var(--purple)" />

          <div style={{height:1,background:"var(--border)",margin:"1.25rem 0"}}/>

          {/* LTR Inputs */}
          {(mode==="ltr"||mode==="both") && (
            <>
              <SectionHead title="Long-Term Rental" accent="var(--teal)" />
              <Slider label="Monthly Rent" value={monthlyRent} min={300} max={10000} step={50} onChange={setMonthlyRent} format={fmt}
                hint={market ? `Market median: ${fmt(market.medianRentMonthly)}/mo` : undefined} color="var(--teal)" />
              <Slider label="Vacancy Rate" value={vacancyRateLTR} min={0} max={0.20} step={0.01} onChange={setVacancyRateLTR} format={fmtPct} hint="% of year unoccupied (5–8% typical)" color="var(--teal)" />
              <Slider label="Operating Expenses" value={opExpensePctLTR} min={0.15} max={0.60} step={0.01} onChange={setOpExpensePctLTR} format={fmtPct} hint="Mgmt, maintenance, insurance (ex. tax/HOA)" color="var(--teal)" />
            </>
          )}

          {/* STR Inputs */}
          {(mode==="str"||mode==="both") && (
            <>
              <SectionHead title="Short-Term Rental" accent="var(--gold)" />
              <Slider label="Nightly Rate" value={nightlyRate} min={50} max={2000} step={5} onChange={setNightlyRate} format={fmt}
                hint={market ? `Market avg: ${fmt(market.strNightlyRate)}/night` : undefined} color="var(--gold)" />
              <Slider label="Occupancy Rate" value={occupancyPct} min={0.10} max={0.95} step={0.01} onChange={setOccupancyPct} format={fmtPct}
                hint={market ? `Market avg: ${fmtPct(market.strOccupancyRate)}` : "% of nights booked annually"} color="var(--gold)" />
              <Slider label="Platform Fee" value={platformFeePct} min={0.01} max={0.15} step={0.005} onChange={setPlatformFeePct} format={v=>(v*100).toFixed(1)+"%"} hint="Airbnb ~3%, VRBO ~5%" color="var(--gold)" />
              <Slider label="Operating Expenses" value={opExpensePctSTR} min={0.15} max={0.60} step={0.01} onChange={setOpExpensePctSTR} format={fmtPct} hint="Cleaning, mgmt, supplies, insurance (ex. tax/HOA)" color="var(--gold)" />
            </>
          )}

          <div style={{fontSize:"0.58rem",color:"var(--muted)",lineHeight:1.8,padding:"1rem 0",borderTop:"1px solid var(--border)",marginTop:"0.5rem"}}>
            ⚠ For illustrative purposes only. Not financial advice. Consult a CPA, licensed agent, and lender before investing.
          </div>
        </div>

        {/* RIGHT: Results */}
        <div className="right-panel" style={{flex:1,overflowY:"auto",padding:"1.5rem",background:"var(--bg)"}}>

          {showMode.map(m => {
            const r = baseResults[m];
            const isSTR = m === "str";
            const accent = isSTR ? "var(--gold)" : "var(--teal)";
            const label = isSTR ? "Short-Term Rental" : "Long-Term Rental";
            const cocC = cocColor(r.cashOnCash);
            const cfC = cfColor(r.monthlyCashFlow);

            return (
              <div key={m} className="fadeIn" style={{marginBottom:"2rem"}}>
                {mode === "both" && (
                  <div style={{display:"flex",alignItems:"center",gap:"0.6rem",marginBottom:"1rem"}}>
                    <div style={{height:2,flex:1,background:`linear-gradient(90deg,${accent},transparent)`}}/>
                    <Tag color={isSTR?"gold":"teal"}>{label}</Tag>
                    <div style={{height:2,flex:1,background:`linear-gradient(270deg,${accent},transparent)`}}/>
                  </div>
                )}

                {/* Priority Metrics */}
                <div className="metrics-row" style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:"0.6rem",marginBottom:"1.25rem"}}>
                  <MetricCard label="Cash-on-Cash" value={fmtPct(r.cashOnCash)} sub={`On ${fmt(r.down)} down`} color={cocC} rank={1} />
                  <MetricCard label="Monthly Cash Flow" value={fmt(r.monthlyCashFlow)} sub={`${fmt(r.annualCashFlow)}/yr`} color={cfC} rank={2} />
                  <MetricCard label="Cap Rate" value={fmtPct(r.capRate)} sub="Unleveraged return" color="var(--blue)" rank={3} />
                  <MetricCard label="Payback Period" value={fmtYr(r.payback)} sub="Total cost ÷ NOI" color="var(--purple)" rank={4} />
                </div>

                {/* Annual P&L */}
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"1rem"}}>
                  <div>
                    <SectionHead title="Annual P&L" accent={accent} />
                    <div style={{display:"grid",gap:"0.3rem"}}>
                      <PLRow label="Gross Revenue" value={r.grossRevenue} />
                      {isSTR && <PLRow label={`Platform Fee (${(platformFeePct*100).toFixed(1)}%)`} value={-r.platformFee} />}
                      {!isSTR && <PLRow label={`Vacancy (${(vacancyRateLTR*100).toFixed(0)}%)`} value={-(monthlyRent*12*vacancyRateLTR)} />}
                      <PLRow label="Operating Expenses" value={-r.opExpenses} />
                      <PLRow label="Net Operating Income" value={r.noi} highlight positive={r.noi>=0} />
                      <PLRow label={`Property Tax (${(propertyTaxRate*100).toFixed(2)}%)`} value={-r.annualTax} />
                      {monthlyHOA > 0 && <PLRow label="HOA" value={-r.annualHOA} />}
                      <PLRow label="NOI After Fixed Costs" value={r.noiAfterFixed} highlight positive={r.noiAfterFixed>=0} />
                      <PLRow label={`Debt Service (${(interestRate*100).toFixed(2)}%, ${loanTermYears}yr)`} value={-r.annualDebt} />
                      <PLRow label="Net Annual Cash Flow" value={r.annualCashFlow} highlight positive={r.annualCashFlow>=0} />
                    </div>
                  </div>

                  {/* Cost Stack + Scenario Table */}
                  <div>
                    <SectionHead title="Investment Stack" accent="var(--gold)" />
                    <div style={{display:"grid",gap:"0.3rem",marginBottom:"1.25rem"}}>
                      {propertyType==="build" ? (
                        <>
                          <CostRow label="Land" value={buildLandCost} total={r.totalCost} color="var(--gold)" />
                          <CostRow label="Construction" value={buildConstructionCost} total={r.totalCost} color="var(--blue)" />
                          <CostRow label="Soft Costs" value={buildSoftCosts} total={r.totalCost} color="var(--muted2)" />
                        </>
                      ) : (
                        <CostRow label="Purchase Price" value={r.totalCost} total={r.totalCost} color="var(--gold)" />
                      )}
                      <div style={{height:1,background:"var(--border)",margin:"0.25rem 0"}}/>
                      <div style={{display:"flex",justifyContent:"space-between",padding:"0.5rem 0.8rem",background:"var(--gold-dim)",borderRadius:6,border:"1px solid var(--gold)30"}}>
                        <span style={{fontSize:"0.7rem",color:"var(--gold)",fontWeight:600}}>Total All-In</span>
                        <span style={{fontSize:"0.82rem",fontWeight:700,color:"var(--gold)"}}>{fmt(r.totalCost)}</span>
                      </div>
                      <div style={{display:"flex",justifyContent:"space-between",padding:"0.4rem 0.8rem",background:"rgba(255,255,255,0.03)",borderRadius:6}}>
                        <span style={{fontSize:"0.68rem",color:"var(--muted2)"}}>Down Payment</span>
                        <span style={{fontSize:"0.75rem",fontWeight:600,color:"var(--text)"}}>{fmt(r.down)}</span>
                      </div>
                      <div style={{display:"flex",justifyContent:"space-between",padding:"0.4rem 0.8rem",background:"rgba(255,255,255,0.03)",borderRadius:6}}>
                        <span style={{fontSize:"0.68rem",color:"var(--muted2)"}}>Loan Amount</span>
                        <span style={{fontSize:"0.75rem",fontWeight:600,color:"var(--text)"}}>{fmt(r.loan)}</span>
                      </div>
                      <div style={{display:"flex",justifyContent:"space-between",padding:"0.4rem 0.8rem",background:"rgba(255,255,255,0.03)",borderRadius:6}}>
                        <span style={{fontSize:"0.68rem",color:"var(--muted2)"}}>Monthly Mortgage</span>
                        <span style={{fontSize:"0.75rem",fontWeight:600,color:"var(--text)"}}>{fmt(r.monthly$)}</span>
                      </div>
                      <div style={{display:"flex",justifyContent:"space-between",padding:"0.4rem 0.8rem",background:"rgba(255,255,255,0.03)",borderRadius:6}}>
                        <span style={{fontSize:"0.68rem",color:"var(--muted2)"}}>GRM</span>
                        <span style={{fontSize:"0.75rem",fontWeight:600,color:"var(--text)"}}>{isFinite(r.grm)&&r.grm>0?r.grm.toFixed(1)+"x":"—"}</span>
                      </div>
                    </div>

                    {/* Scenario Table */}
                    <SectionHead title="Scenario Analysis" accent="var(--purple)" />
                    <div style={{borderRadius:8,overflow:"hidden",border:"1px solid var(--border)"}}>
                      <table style={{width:"100%",borderCollapse:"collapse",fontSize:"0.68rem"}}>
                        <thead>
                          <tr style={{background:"var(--surface2)"}}>
                            <th style={{padding:"0.5rem 0.7rem",color:"var(--muted2)",fontWeight:600,textAlign:"left",letterSpacing:"0.08em",fontSize:"0.6rem",textTransform:"uppercase"}}>Scenario</th>
                            <th style={{padding:"0.5rem 0.5rem",color:"var(--muted2)",fontWeight:600,textAlign:"right",letterSpacing:"0.08em",fontSize:"0.6rem",textTransform:"uppercase"}}>CoC</th>
                            <th style={{padding:"0.5rem 0.5rem",color:"var(--muted2)",fontWeight:600,textAlign:"right",letterSpacing:"0.08em",fontSize:"0.6rem",textTransform:"uppercase"}}>Mo. CF</th>
                            <th style={{padding:"0.5rem 0.5rem",color:"var(--muted2)",fontWeight:600,textAlign:"right",letterSpacing:"0.08em",fontSize:"0.6rem",textTransform:"uppercase"}}>Cap Rate</th>
                          </tr>
                        </thead>
                        <tbody>
                          {[
                            ["Conservative","var(--red)",scenarios.conservative[m]],
                            ["Base Case","var(--gold)",scenarios.base[m]],
                            ["Optimistic","var(--teal)",scenarios.optimistic[m]],
                          ].map(([name,sc,res])=>(
                            <tr key={name} style={{borderTop:"1px solid var(--border)"}}>
                              <td style={{padding:"0.5rem 0.7rem"}}>
                                <div style={{display:"flex",alignItems:"center",gap:"0.4rem"}}>
                                  <div style={{width:5,height:5,borderRadius:"50%",background:sc}}/>
                                  <span style={{color:"var(--text)",fontWeight:name==="Base Case"?600:400}}>{name}</span>
                                </div>
                              </td>
                              <td style={{padding:"0.5rem 0.5rem",textAlign:"right",color:cocColor(res.cashOnCash),fontWeight:600}}>{fmtPct(res.cashOnCash)}</td>
                              <td style={{padding:"0.5rem 0.5rem",textAlign:"right",color:cfColor(res.monthlyCashFlow),fontWeight:600}}>{fmt(res.monthlyCashFlow)}</td>
                              <td style={{padding:"0.5rem 0.5rem",textAlign:"right",color:"var(--blue)",fontWeight:600}}>{fmtPct(res.capRate)}</td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  </div>
                </div>
              </div>
            );
          })}

          {/* Compare Both summary bar */}
          {mode === "both" && (
            <div className="fadeIn" style={{
              background:"linear-gradient(135deg,var(--teal-dim),var(--gold-dim))",
              border:"1px solid var(--border2)", borderRadius:10,
              padding:"1rem 1.25rem", marginTop:"0.5rem"
            }}>
              <SectionHead title="Side-by-Side Verdict" accent="var(--teal)" />
              <div style={{display:"grid",gridTemplateColumns:"1fr auto 1fr",gap:"1rem",alignItems:"center"}}>
                <VerdictSide label="Long-Term Rental" r={baseResults.ltr} color="var(--teal)" />
                <div style={{textAlign:"center"}}>
                  <div style={{fontSize:"0.6rem",color:"var(--muted)",letterSpacing:"0.15em",textTransform:"uppercase",marginBottom:"0.3rem"}}>vs</div>
                  <WinnerBadge ltr={baseResults.ltr} str={baseResults.str} />
                </div>
                <VerdictSide label="Short-Term Rental" r={baseResults.str} color="var(--gold)" right />
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

const MarketStat = ({label, value}) => (
  <div>
    <div style={{fontSize:"0.58rem",color:"var(--muted)",letterSpacing:"0.1em",textTransform:"uppercase"}}>{label}</div>
    <div style={{fontSize:"0.82rem",fontWeight:700,color:"var(--text)",fontFamily:"var(--font-display)"}}>{value}</div>
  </div>
);

const CostRow = ({label, value, total, color}) => {
  const pct = total > 0 ? value/total : 0;
  return (
    <div style={{padding:"0.45rem 0.8rem",background:"rgba(255,255,255,0.02)",borderRadius:6,border:"1px solid var(--border)"}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:"0.3rem"}}>
        <span style={{fontSize:"0.68rem",color:"var(--muted2)"}}>{label}</span>
        <span style={{fontSize:"0.75rem",fontWeight:600,color:"var(--text)"}}>{fmt(value)}</span>
      </div>
      <div style={{height:2,background:"rgba(255,255,255,0.06)",borderRadius:2}}>
        <div style={{height:"100%",width:(pct*100)+"%",background:color,borderRadius:2,transition:"width 0.4s ease"}}/>
      </div>
    </div>
  );
};

const VerdictSide = ({label, r, color, right}) => (
  <div style={{textAlign: right?"right":"left"}}>
    <div style={{fontSize:"0.65rem",color,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:"0.4rem"}}>{label}</div>
    <div style={{fontSize:"1.1rem",fontWeight:800,fontFamily:"var(--font-display)",color}}>{fmtPct(r.cashOnCash)}</div>
    <div style={{fontSize:"0.68rem",color:"var(--muted2)"}}>Cash-on-Cash</div>
    <div style={{fontSize:"0.82rem",fontWeight:700,color:"var(--text)",marginTop:"0.25rem"}}>{fmt(r.monthlyCashFlow)}<span style={{fontSize:"0.6rem",color:"var(--muted2)"}}>/mo</span></div>
  </div>
);

const WinnerBadge = ({ltr, str}) => {
  const ltrWins = ltr.cashOnCash >= str.cashOnCash;
  const tied = Math.abs(ltr.cashOnCash - str.cashOnCash) < 0.005;
  if (tied) return <div style={{fontSize:"0.65rem",color:"var(--muted2)"}}>Tied</div>;
  return (
    <div style={{
      background: ltrWins ? "var(--teal-dim)" : "var(--gold-dim)",
      border:`1px solid ${ltrWins?"var(--teal)":"var(--gold)"}40`,
      borderRadius:8, padding:"0.4rem 0.7rem", fontSize:"0.62rem",
      color: ltrWins ? "var(--teal)" : "var(--gold)", fontWeight:700,
      letterSpacing:"0.08em", textTransform:"uppercase", textAlign:"center"
    }}>
      {ltrWins ? "LTR Wins" : "STR Wins"}
    </div>
  );
};

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
