<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Health Tracker v1.0</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script src="https://apis.google.com/js/api.js"></script>
<script src="https://accounts.google.com/gsi/client" async></script>
<style>
:root {
  --bg:      #0d1117;
  --bg2:     #161b22;
  --bg3:     #1c2430;
  --bg4:     #21262d;
  --border:  #30363d;
  --border2: #3d444d;
  --accent:  #00b4d8;
  --accent2: #0077a8;
  --gold:    #ffd700;
  --gold2:   #b89a00;
  --text:    #e6edf3;
  --muted:   #8b949e;
  --dim:     #484f58;
  --ok:      #3fb950;
  --warn:    #d29922;
  --danger:  #f85149;
  --info:    #58a6ff;
  --clinical:#00b4d8;
  --wellness:#5e6672;
  --radius:  8px;
  --radius2: 12px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.5; }
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg2); }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

/* ── AUTH GATE ── */
#authGate {
  position: fixed; inset: 0; background: var(--bg);
  display: flex; align-items: center; justify-content: center; z-index: 1000;
}
.auth-box {
  background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius2);
  padding: 40px 48px; width: 380px; text-align: center;
}
.auth-box .logo { font-size: 28px; font-weight: 700; color: var(--accent); letter-spacing: -0.5px; margin-bottom: 4px; }
.auth-box .sub { color: var(--muted); font-size: 12px; margin-bottom: 28px; }
.auth-box input {
  width: 100%; padding: 10px 14px; background: var(--bg3); border: 1px solid var(--border);
  border-radius: var(--radius); color: var(--text); font-family: inherit; font-size: 14px;
  margin-bottom: 12px; outline: none; transition: border-color .2s;
}
.auth-box input:focus { border-color: var(--accent); }
.auth-box .btn-primary {
  width: 100%; padding: 10px; background: var(--accent); color: #000; font-family: inherit;
  font-weight: 600; font-size: 14px; border: none; border-radius: var(--radius); cursor: pointer;
  transition: background .2s;
}
.auth-box .btn-primary:hover { background: #00d4ff; }
.auth-box .err { color: var(--danger); font-size: 12px; margin-top: 8px; min-height: 16px; }
.auth-box .set-note { color: var(--muted); font-size: 11px; margin-top: 8px; }

/* ── MAIN LAYOUT ── */
#app { display: none; flex-direction: column; height: 100vh; overflow: hidden; }
header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 20px; height: 52px; background: var(--bg2);
  border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.header-left { display: flex; align-items: center; gap: 12px; }
.app-title { font-size: 16px; font-weight: 700; color: var(--accent); }
.app-ver { font-size: 10px; color: var(--muted); font-family: 'DM Mono', monospace; background: var(--bg3); padding: 2px 6px; border-radius: 4px; border: 1px solid var(--border); }
.header-right { display: flex; align-items: center; gap: 10px; }
.drive-status { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--muted); cursor: pointer; padding: 5px 10px; border-radius: 6px; background: var(--bg3); border: 1px solid var(--border); transition: border-color .2s; }
.drive-status:hover { border-color: var(--accent); }
.drive-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--dim); }
.drive-dot.connected { background: var(--ok); }

/* ── TABS ── */
.tabs {
  display: flex; gap: 0; background: var(--bg2);
  border-bottom: 1px solid var(--border); flex-shrink: 0;
  overflow-x: auto;
}
.tab-btn {
  padding: 10px 18px; font-family: inherit; font-size: 13px; font-weight: 500;
  color: var(--muted); background: transparent; border: none; border-bottom: 2px solid transparent;
  cursor: pointer; transition: all .2s; white-space: nowrap; flex-shrink: 0;
}
.tab-btn:hover { color: var(--text); }
.tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

/* ── CONTENT ── */
#content { flex: 1; overflow-y: auto; padding: 20px; }
.tab-pane { display: none; }
.tab-pane.active { display: block; }

/* ── CARDS ── */
.card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius2); padding: 16px 20px;
}
.card-title { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .6px; margin-bottom: 12px; }
.grid { display: grid; gap: 14px; }
.g2 { grid-template-columns: repeat(2, 1fr); }
.g3 { grid-template-columns: repeat(3, 1fr); }
.g4 { grid-template-columns: repeat(4, 1fr); }
.g6 { grid-template-columns: repeat(6, 1fr); }
@media(max-width:1100px){ .g6{grid-template-columns:repeat(3,1fr);} }
@media(max-width:900px){ .g4{grid-template-columns:repeat(2,1fr);} .g3{grid-template-columns:repeat(2,1fr);} }
@media(max-width:600px){ .g2,.g3,.g4,.g6{grid-template-columns:1fr;} }

/* ── METRIC CARDS ── */
.metric-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius2); padding: 14px 16px;
  position: relative; overflow: hidden;
}
.metric-card .mc-label { font-size: 10px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
.metric-card .mc-value { font-family: 'DM Mono', monospace; font-size: 26px; font-weight: 500; line-height: 1.1; margin: 6px 0 2px; }
.metric-card .mc-unit { font-size: 11px; color: var(--muted); }
.metric-card .mc-trend { display: flex; align-items: center; gap: 4px; font-size: 11px; margin-top: 4px; }
.metric-card .mc-range { font-size: 10px; color: var(--dim); margin-top: 2px; }
.metric-card canvas.sparkline { position: absolute; bottom: 0; right: 0; opacity: 0.4; }
.mc-ok .mc-value { color: var(--ok); }
.mc-warn .mc-value { color: var(--warn); }
.mc-danger .mc-value { color: var(--danger); }
.mc-info .mc-value { color: var(--info); }
.trend-up { color: var(--danger); }
.trend-down { color: var(--ok); }
.trend-up-good { color: var(--ok); }
.trend-flat { color: var(--muted); }

/* ── VISIT CARDS ── */
.visit-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius2); margin-bottom: 10px; overflow: hidden;
}
.visit-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px; cursor: pointer; transition: background .15s;
}
.visit-header:hover { background: var(--bg3); }
.visit-header-left { display: flex; align-items: center; gap: 10px; }
.visit-date { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; }
.visit-facility { font-size: 12px; color: var(--muted); }
.visit-type-badge {
  font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 20px;
  text-transform: uppercase; letter-spacing: .4px;
}
.badge-clinical { background: rgba(0,180,216,.15); color: var(--clinical); border: 1px solid rgba(0,180,216,.3); }
.badge-wellness { background: rgba(94,102,114,.15); color: var(--wellness); border: 1px solid rgba(94,102,114,.3); }
.badge-partial { background: rgba(210,153,34,.15); color: var(--warn); border: 1px solid rgba(210,153,34,.3); }
.visit-chevron { font-size: 12px; color: var(--muted); transition: transform .2s; }
.visit-chevron.open { transform: rotate(180deg); }
.visit-body { padding: 0 16px 16px; display: none; }
.visit-body.open { display: block; }

.lab-section { margin-bottom: 14px; }
.lab-section-title {
  font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase;
  letter-spacing: .6px; margin-bottom: 8px; padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
}
.lab-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 6px; }
.lab-item {
  background: var(--bg3); border-radius: 6px; padding: 8px 10px;
  display: flex; align-items: center; justify-content: space-between;
}
.lab-item-name { font-size: 11px; color: var(--muted); }
.lab-item-val { font-family: 'DM Mono', monospace; font-size: 13px; }
.lab-item-val.flag-h { color: var(--danger); }
.lab-item-val.flag-l { color: var(--info); }
.lab-item-val.flag-ok { color: var(--ok); }
.lab-item-val.flag-none { color: var(--text); }
.flag-badge {
  font-size: 9px; font-weight: 700; padding: 1px 4px; border-radius: 3px;
  margin-left: 4px;
}
.fb-h { background: rgba(248,81,73,.2); color: var(--danger); }
.fb-l { background: rgba(88,166,255,.2); color: var(--info); }

.vitals-row { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 8px; }
.vital-chip {
  background: var(--bg3); border-radius: 6px; padding: 6px 12px;
  display: flex; align-items: center; gap: 6px;
}
.vital-chip .vc-label { font-size: 11px; color: var(--muted); }
.vital-chip .vc-val { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; }

.visit-notes { font-size: 11px; color: var(--muted); font-style: italic; margin-top: 10px; border-top: 1px solid var(--border); padding-top: 8px; }
.fib4-row { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
.fib4-label { font-size: 11px; color: var(--muted); }
.fib4-val { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; }
.fib4-interp { font-size: 11px; }

/* ── TRENDS ── */
.chart-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius2); padding: 20px; margin-bottom: 14px; }
.chart-card h3 { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
.chart-card .chart-sub { font-size: 11px; color: var(--muted); margin-bottom: 16px; }
.chart-wrap { position: relative; height: 220px; }

/* ── MEDICATIONS ── */
.med-card {
  background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius2);
  padding: 14px 16px; margin-bottom: 8px; display: flex; align-items: flex-start; justify-content: space-between;
}
.med-info { flex: 1; }
.med-name { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
.med-dose { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--accent); }
.med-indication { font-size: 11px; color: var(--muted); margin-top: 2px; }
.med-dates { font-size: 11px; color: var(--dim); margin-top: 4px; }
.med-actions { display: flex; gap: 6px; align-items: center; margin-left: 12px; }
.med-status { font-size: 10px; padding: 3px 8px; border-radius: 20px; font-weight: 600; text-transform: uppercase; letter-spacing: .4px; }
.med-active { background: rgba(63,185,80,.15); color: var(--ok); border: 1px solid rgba(63,185,80,.3); }
.med-stopped { background: rgba(248,81,73,.1); color: var(--muted); border: 1px solid var(--border); }

/* ── WEIGHT LOG ── */
.weight-quick-card {
  background: linear-gradient(135deg, var(--bg2) 0%, var(--bg3) 100%);
  border: 1px solid var(--border); border-radius: var(--radius2); padding: 20px;
  margin-bottom: 14px;
}
.weight-current { font-family: 'DM Mono', monospace; font-size: 48px; font-weight: 300; color: var(--accent); line-height: 1; }
.weight-current-unit { font-size: 16px; color: var(--muted); margin-left: 6px; }
.weight-bmi { font-size: 13px; color: var(--muted); margin-top: 4px; }
.weight-quick-form { display: flex; gap: 8px; margin-top: 14px; align-items: flex-end; flex-wrap: wrap; }
.quick-input-group { display: flex; flex-direction: column; gap: 4px; }
.quick-input-group label { font-size: 11px; color: var(--muted); }
.quick-input-group input {
  padding: 7px 10px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
  color: var(--text); font-family: 'DM Mono', monospace; font-size: 13px; width: 110px; outline: none;
  transition: border-color .2s;
}
.quick-input-group input:focus { border-color: var(--accent); }
.weight-log-table { width: 100%; border-collapse: collapse; }
.weight-log-table th { font-size: 10px; font-weight: 600; color: var(--muted); text-transform: uppercase; padding: 6px 10px; text-align: left; border-bottom: 1px solid var(--border); }
.weight-log-table td { font-size: 13px; padding: 8px 10px; border-bottom: 1px solid var(--border2); }
.weight-log-table td:nth-child(2) { font-family: 'DM Mono', monospace; }
.weight-log-table tr:last-child td { border-bottom: none; }

/* ── IMAGING ── */
.imaging-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius2); padding: 14px 16px; margin-bottom: 8px; }
.imaging-type { font-size: 10px; font-weight: 600; color: var(--accent); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }
.imaging-desc { font-size: 14px; font-weight: 500; margin-bottom: 2px; }
.imaging-facility { font-size: 11px; color: var(--muted); }
.imaging-notes-text { font-size: 11px; color: var(--muted); margin-top: 6px; font-style: italic; }

/* ── CONDITIONS ── */
.condition-card {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 8px;
  padding: 12px 14px; margin-bottom: 8px;
}
.condition-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
.condition-name { font-weight: 600; font-size: 13px; }
.condition-icd { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); }
.condition-status { font-size: 10px; padding: 2px 8px; border-radius: 20px; font-weight: 600; text-transform: uppercase; letter-spacing: .4px; }
.cs-active { background: rgba(248,81,73,.15); color: var(--danger); border: 1px solid rgba(248,81,73,.3); }
.cs-managed { background: rgba(63,185,80,.15); color: var(--ok); border: 1px solid rgba(63,185,80,.3); }
.cs-monitoring { background: rgba(210,153,34,.15); color: var(--warn); border: 1px solid rgba(210,153,34,.3); }
.condition-notes-text { font-size: 11px; color: var(--muted); }

/* ── SETTINGS ── */
.settings-section { margin-bottom: 24px; }
.settings-section h3 { font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .6px; margin-bottom: 12px; }
.settings-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border2); }
.settings-row:last-child { border-bottom: none; }
.sr-label { font-size: 13px; }
.sr-sub { font-size: 11px; color: var(--muted); margin-top: 1px; }
.settings-input {
  padding: 6px 10px; background: var(--bg3); border: 1px solid var(--border); border-radius: 6px;
  color: var(--text); font-family: inherit; font-size: 13px; outline: none;
  transition: border-color .2s; min-width: 200px;
}
.settings-input:focus { border-color: var(--accent); }

/* ── BUTTONS ── */
.btn { padding: 7px 14px; border-radius: 6px; font-family: inherit; font-size: 13px; font-weight: 500; cursor: pointer; border: none; transition: all .15s; display: inline-flex; align-items: center; gap: 6px; }
.btn-accent { background: var(--accent); color: #000; }
.btn-accent:hover { background: #00d4ff; }
.btn-outline { background: transparent; color: var(--text); border: 1px solid var(--border); }
.btn-outline:hover { border-color: var(--accent); color: var(--accent); }
.btn-danger { background: transparent; color: var(--danger); border: 1px solid rgba(248,81,73,.3); }
.btn-danger:hover { background: rgba(248,81,73,.1); }
.btn-sm { padding: 4px 10px; font-size: 12px; }
.btn-gold { background: var(--gold); color: #000; }
.btn-gold:hover { background: #ffe44d; }

/* ── MODAL ── */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.6); display: flex; align-items: center; justify-content: center; z-index: 500; }
.modal { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius2); width: 480px; max-width: 95vw; max-height: 85vh; overflow-y: auto; }
.modal-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--border); }
.modal-header h2 { font-size: 15px; font-weight: 600; }
.modal-close { background: none; border: none; color: var(--muted); font-size: 20px; cursor: pointer; line-height: 1; }
.modal-close:hover { color: var(--text); }
.modal-body { padding: 20px; }
.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; margin-bottom: 5px; }
.form-group input, .form-group select, .form-group textarea {
  width: 100%; padding: 8px 12px; background: var(--bg3); border: 1px solid var(--border);
  border-radius: 6px; color: var(--text); font-family: inherit; font-size: 13px; outline: none;
  transition: border-color .2s;
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--accent); }
.form-group textarea { resize: vertical; min-height: 60px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.modal-footer { display: flex; gap: 8px; justify-content: flex-end; padding: 14px 20px; border-top: 1px solid var(--border); }

/* ── MISC ── */
.section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.section-title { font-size: 15px; font-weight: 600; }
.empty-state { text-align: center; color: var(--muted); padding: 40px 20px; font-size: 13px; }
.sep { height: 1px; background: var(--border); margin: 16px 0; }
.tooltip-note { font-size: 10px; color: var(--dim); font-style: italic; }

/* dashboard */
.dashboard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
@media(max-width:800px){ .dashboard-grid { grid-template-columns: 1fr; } }

.trend-banner {
  background: linear-gradient(90deg, rgba(0,180,216,.08) 0%, transparent 100%);
  border: 1px solid rgba(0,180,216,.2); border-radius: var(--radius2);
  padding: 12px 16px; margin-bottom: 14px; font-size: 12px; color: var(--muted);
}
.trend-banner strong { color: var(--accent); }

/* Chart.js dark theme override */
</style>
</head>
<body>

<!-- AUTH GATE -->
<div id="authGate">
  <div class="auth-box">
    <div class="logo">❤ Health Tracker</div>
    <div class="sub">Personal Health Dashboard — v1.0</div>
    <input type="password" id="pwInput" placeholder="Enter password" autocomplete="current-password">
    <button class="btn-primary" onclick="submitAuth()">Unlock</button>
    <div class="err" id="authErr"></div>
    <div class="set-note" id="authNote"></div>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <header>
    <div class="header-left">
      <div class="app-title">❤ Health Tracker</div>
      <div class="app-ver">v1.0</div>
    </div>
    <div class="header-right">
      <div class="drive-status" id="driveStatus" onclick="handleDriveClick()">
        <div class="drive-dot" id="driveDot"></div>
        <span id="driveLabel">Drive Sync</span>
      </div>
    </div>
  </header>
  <nav class="tabs">
    <button class="tab-btn active" onclick="switchTab('dashboard')">Dashboard</button>
    <button class="tab-btn" onclick="switchTab('visits')">Lab Visits</button>
    <button class="tab-btn" onclick="switchTab('trends')">Trends</button>
    <button class="tab-btn" onclick="switchTab('meds')">Medications</button>
    <button class="tab-btn" onclick="switchTab('vitals')">Vitals & Weight</button>
    <button class="tab-btn" onclick="switchTab('imaging')">Imaging & Notes</button>
    <button class="tab-btn" onclick="switchTab('settings')">Settings</button>
  </nav>
  <div id="content">
    <div id="pane-dashboard" class="tab-pane active"></div>
    <div id="pane-visits" class="tab-pane"></div>
    <div id="pane-trends" class="tab-pane"></div>
    <div id="pane-meds" class="tab-pane"></div>
    <div id="pane-vitals" class="tab-pane"></div>
    <div id="pane-imaging" class="tab-pane"></div>
    <div id="pane-settings" class="tab-pane"></div>
  </div>
</div>

<!-- MODAL CONTAINER -->
<div id="modalContainer"></div>

<script>
'use strict';
// ═══════════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════════
const CLIENT_ID = '305146523481-1gucm4vggu2pmucqjgae0vhb1deavnqb.apps.googleusercontent.com';
const DRIVE_SCOPE = 'https://www.googleapis.com/auth/drive.appdata';
const DRIVE_FILE = 'health_tracker_data.json';
const LS_KEY = 'health_v1';
const PW_KEY = 'health_pw_hash';
const APP_VER = '1.0';

// ═══════════════════════════════════════════════════════
// REFERENCE RANGES
// ═══════════════════════════════════════════════════════
const REF = {
  totalCholesterol:{ min:125, max:199, unit:'mg/dL', label:'Total Cholesterol', dir:'low' },
  triglycerides:   { min:0,   max:149, unit:'mg/dL', label:'Triglycerides',     dir:'low' },
  hdl:             { min:40,  max:999, unit:'mg/dL', label:'HDL Cholesterol',   dir:'high' },

function getFlag(key, val) {
  if (val == null) return 'none';

  if (!r) return 'none';
  if (val < r.min) return 'L';
  if (val > r.max) return 'H';
  return 'ok';
}

// AUTH
// ═══════════════════════════════════════════════════════
async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

async function submitAuth() {
  const pw = document.getElementById('pwInput').value;
  if (!pw) return;
  const stored = localStorage.getItem(PW_KEY);
  const hash = await sha256(pw);
  if (!stored) {
    // First run — set password
    localStorage.setItem(PW_KEY, hash);
    unlockApp();
  } else if (hash === stored) {
    unlockApp();
  } else {
    document.getElementById('authErr').textContent = 'Incorrect password.';
    document.getElementById('pwInput').value = '';
  }
}
document.addEventListener('DOMContentLoaded', () => {
  const stored = localStorage.getItem(PW_KEY);
  if (!stored) {
    document.getElementById('authNote').textContent = 'First run — set a password to get started.';
  }
  document.getElementById('pwInput').addEventListener('keydown', e => { if(e.key==='Enter') submitAuth(); });
});
function unlockApp() {
  document.getElementById('authGate').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  initApp();
}

function fmtDate(d) {
  if (!d) return '—';
  const dt = new Date(d+'T00:00:00');
  return dt.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
}
function fmtDateShort(d) {
  if (!d) return '—';
  const dt = new Date(d+'T00:00:00');
  return dt.toLocaleDateString('en-US',{month:'short',year:'2-digit'});
}
function sortedVisits() {

function latestClinical() {
  return [...appData.labVisits].filter(v=>v.visitType==='clinical').sort((a,b)=>b.date.localeCompare(a.date))[0];
}
function latestAny() {
  return [...appData.labVisits].sort((a,b)=>b.date.localeCompare(a.date))[0];
}
function calcAge(date) {
  const dob = new Date(appData.settings.dob);
  const d = new Date(date+'T00:00:00');
  let age = d.getFullYear() - dob.getFullYear();
  const m = d.getMonth() - dob.getMonth();
  if (m < 0 || (m === 0 && d.getDate() < dob.getDate())) age--;
  return age;
}
function calcFIB4(visit) {
  const {ast,alt,platelets} = visit.labs || {};
  if (!ast||!alt||!platelets) return null;
  const age = calcAge(visit.date);
  return (age * ast) / (platelets * Math.sqrt(alt));
}
function calcBMI(weight, heightIn) {
  if (!weight || !heightIn) return null;
  return (703 * weight) / (heightIn * heightIn);
}
function uid() { return 'id_' + Math.random().toString(36).slice(2); }

// Trend direction helpers
function trendDir(curr, prev, higherIsBetter) {
  if (curr == null || prev == null) return 'flat';
  const delta = curr - prev;
  if (Math.abs(delta) < 0.01) return 'flat';
  if (higherIsBetter) return delta > 0 ? 'up-good' : 'down-bad';
  return delta < 0 ? 'down' : 'up';
}
function trendHtml(curr, prev, higherIsBetter) {
  const dir = trendDir(curr, prev, higherIsBetter);
  if (dir === 'flat') return '<span class="trend-flat">→ no change</span>';
  if (dir === 'down') return `<span class="trend-down">↓ ${Math.abs(curr-prev).toFixed(1)} vs prior</span>`;
  if (dir === 'up')   return `<span class="trend-up">↑ ${Math.abs(curr-prev).toFixed(1)} vs prior</span>`;
  if (dir === 'up-good') return `<span class="trend-up-good">↑ ${Math.abs(curr-prev).toFixed(1)} vs prior</span>`;
  return `<span class="trend-down">↓ ${Math.abs(curr-prev).toFixed(1)} vs prior</span>`;
}

// Sparkline
function drawSparkline(canvas, values, color) {
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;
  ctx.clearRect(0,0,w,h);
  const clean = values.filter(v => v != null);
  if (clean.length < 2) return;
  const min = Math.min(...clean) * 0.92;
  const max = Math.max(...clean) * 1.08;
  const xStep = w / (clean.length - 1);
  const grad = ctx.createLinearGradient(0,0,w,0);
  grad.addColorStop(0,'rgba(0,180,216,0.3)');
  grad.addColorStop(1,color);
  ctx.beginPath();
  ctx.strokeStyle = grad;
  ctx.lineWidth = 2;
  ctx.lineJoin = 'round';
  clean.forEach((v,i) => {
    const x = i * xStep;
    const y = h - ((v - min) / (max - min || 1)) * (h - 4) - 2;
    i === 0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
  });
  ctx.stroke();
  // dot at end
  const lx = (clean.length-1)*xStep;
  const ly = h - ((clean[clean.length-1]-min)/(max-min||1))*(h-4)-2;
  ctx.beginPath();
  ctx.arc(lx,ly,3,0,Math.PI*2);
  ctx.fillStyle = color;
  ctx.fill();
}

function getSparkValues(key) {
  return [...appData.labVisits]
    .sort((a,b)=>a.date.localeCompare(b.date))
    .map(v => (v.labs && v.labs[key] != null) ? v.labs[key] : null)

}

  const prevLabs = prev?.labs || {};
  const labs = lc?.labs || {};

  const metrics = [
    { key:'triglycerides', label:'Triglycerides', higherBetter:false },
    { key:'ldl',           label:'LDL Cholesterol', higherBetter:false },
    { key:'hdl',           label:'HDL Cholesterol', higherBetter:true  },
    { key:'hba1c',         label:'HbA1c', higherBetter:false },
    { key:'alt',           label:'ALT (Liver)', higherBetter:false },
    { key:'glucose',       label:'Glucose', higherBetter:false }
  ];

  let cardsHtml = metrics.map(m => {
    const val = labs[m.key];
    const pval = prevLabs[m.key];
    const ref = REF[m.key];
    const flag = getFlag(m.key, val);
    const statusClass = flag==='H' ? 'mc-danger' : flag==='L' ? (m.higherBetter ? 'mc-danger' : 'mc-info') : 'mc-ok';
    const trend = val!=null && pval!=null ? trendHtml(val, pval, m.higherBetter) : '';
    return `<div class="metric-card ${statusClass}" id="mc-${m.key}">
      <div class="mc-label">${m.label}</div>
      <div class="mc-value">${val != null ? val : '—'}<span class="mc-unit"> ${ref?.unit||''}</span></div>
      <div class="mc-trend">${trend}</div>
      <div class="mc-range">Ref: ${ref ? (ref.dir==='high'?'≥'+ref.min:ref.dir==='low'?'<'+ref.max:ref.min+'–'+ref.max) : ''} ${ref?.unit||''}</div>
      <canvas class="sparkline" width="80" height="40" id="spark-${m.key}"></canvas>
    </div>`;
  }).join('');

  // Latest weight
  const wt = [...appData.weightLog].sort((a,b)=>b.date.localeCompare(a.date))[0];
  const prevWt = [...appData.weightLog].sort((a,b)=>b.date.localeCompare(a.date))[1];
  const wtDelta = (wt && prevWt) ? (wt.weight - prevWt.weight).toFixed(1) : null;
  const wtDeltaHtml = wtDelta ? `<span style="color:${parseFloat(wtDelta)<0?'var(--ok)':'var(--warn)'}">${parseFloat(wtDelta)>0?'+':''}${wtDelta} lbs vs prior</span>` : '';

  // FIB-4
  const fib4 = lc ? calcFIB4(lc) : null;
  const fib4Html = fib4 ? `FIB-4 Score: <strong style="color:${fib4<1.3?'var(--ok)':fib4<2.67?'var(--warn)':'var(--danger)'}">${fib4.toFixed(2)}</strong> <span style="font-size:11px;color:var(--muted)">(${fib4<1.3?'Low risk for fibrosis':fib4<2.67?'Indeterminate — follow up':'High risk — refer for biopsy'})</span>` : '';

  const pane = document.getElementById('pane-dashboard');

function quickAddWeight() {

function renderVisitCard(v) {
  const isPartial = v.flags?.includes('partial_data');
  const badgeClass = v.visitType==='clinical' ? 'badge-clinical' : isPartial ? 'badge-partial' : 'badge-wellness';
  const badgeText = v.visitType==='clinical' ? 'Full Panel' : isPartial ? 'Partial Data' : 'Wellness Screen';
  const labKeys = Object.keys(v.labs||{}).filter(k => v.labs[k] != null);
  const fib4 = calcFIB4(v);

  const labSections = buildLabSections(v.labs||{});

  return `<div class="visit-card">
    <div class="visit-header" onclick="toggleVisit('${v.id}')">
      <div class="visit-header-left">
        <div>
          <div class="visit-date">${fmtDate(v.date)}</div>
          <div class="visit-facility">${v.facility}</div>
        </div>
        <span class="visit-type-badge ${badgeClass}">${badgeText}</span>
        ${v.visitType==='wellness'?'<span style="font-size:10px;color:var(--dim);font-family:\'DM Mono\',monospace">'+labKeys.length+' values</span>':''}
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        ${v.vitals?.bpSys ? `<span style="font-size:11px;font-family:'DM Mono',monospace;color:var(--muted)">${v.vitals.bpSys}/${v.vitals.bpDia??'?'} mmHg</span>` : ''}
        ${v.vitals?.weight ? `<span style="font-size:11px;font-family:'DM Mono',monospace;color:var(--muted)">${v.vitals.weight} lbs</span>` : ''}
        <span class="visit-chevron" id="chev-${v.id}">▼</span>
      </div>
    </div>
    <div class="visit-body" id="body-${v.id}">
      ${labSections}
      ${v.vitals ? renderVitalsChips(v.vitals) : ''}
      ${fib4 != null ? `<div class="fib4-row"><span class="fib4-label">FIB-4 Score:</span><span class="fib4-val" style="color:${fib4<1.3?'var(--ok)':fib4<2.67?'var(--warn)':'var(--danger)'}">${fib4.toFixed(2)}</span><span class="fib4-interp" style="font-size:11px;color:var(--muted)">${fib4<1.3?'✓ Low risk for advanced fibrosis':fib4<2.67?'⚠ Indeterminate':'⚠ High risk'}</span></div>` : ''}
      ${v.notes ? `<div class="visit-notes">📋 ${v.notes}</div>` : ''}
    </div>
  </div>`;
}

function buildLabSections(labs) {
  const sections = {
    'Lipids': ['totalCholesterol','triglycerides','hdl','ldl','vldl','directLdl','cholHdlRatio'],
    'Liver': ['ast','alt','alp','albumin','biliTotal','biliDirect','totalProtein'],
    'Metabolic / CMP': ['glucose','hba1c','bun','creatinine','egfr','sodium','potassium','chloride','co2','calcium'],
    'Other': ['tsh','freeT4','psa'],
    'CBC': ['wbc','rbc','hemoglobin','hematocrit','platelets','mcv']
  };
  let html = '';
  for (const [section, keys] of Object.entries(sections)) {
    const items = keys.filter(k => labs[k] != null);
    if (!items.length) continue;
    html += `<div class="lab-section">
      <div class="lab-section-title">${section}</div>
      <div class="lab-grid">
        ${items.map(k => {
          const val = labs[k];
          const f = getFlag(k, val);
          const cls = f==='H'?'flag-h':f==='L'?'flag-l':f==='ok'?'flag-ok':'flag-none';
          const fb = f==='H'?'<span class="flag-badge fb-h">H</span>':f==='L'?'<span class="flag-badge fb-l">L</span>':'';
          return `<div class="lab-item">
            <span class="lab-item-name">${REF[k]?.label||k}</span>
            <span class="lab-item-val ${cls}">${val}${fb} <span style="font-size:10px;color:var(--dim)">${REF[k]?.unit||''}</span></span>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }
  if (!html) html = `<div style="color:var(--dim);font-size:12px;padding:8px 0">No lab values recorded for this visit.</div>`;
  return html;
}

function renderVitalsChips(vitals) {
  const chips = [];
  if (vitals.bpSys != null) chips.push({ label:'BP', val:`${vitals.bpSys}/${vitals.bpDia??'?'} mmHg` });
  if (vitals.pulse != null) chips.push({ label:'Pulse', val:`${vitals.pulse} bpm` });
  if (vitals.o2 != null)    chips.push({ label:'O₂', val:`${vitals.o2}%` });
  if (vitals.temp != null)  chips.push({ label:'Temp', val:`${vitals.temp}°F` });
  if (vitals.weight != null) chips.push({ label:'Weight', val:`${vitals.weight} lbs` });
  if (vitals.bmi != null)   chips.push({ label:'BMI', val:`${vitals.bmi}` });
  if (vitals.waistCirc != null) chips.push({ label:'Waist', val:`${vitals.waistCirc} in` });
  if (!chips.length) return '';
  return `<div class="lab-section">
    <div class="lab-section-title">Vitals & Physical</div>
    <div class="vitals-row">
      ${chips.map(c=>`<div class="vital-chip"><span class="vc-label">${c.label}</span><span class="vc-val">${c.val}</span></div>`).join('')}
    </div>
  </div>`;
}

const MED_EVENTS = [
  { date:'2025-02-20', label:'Meds Started\n(Rosuvastatin+Ezetimibe)' }
];

const chartDefaults = {
  plugins: {
    legend: { labels: { color:'#8b949e', font:{ family:'Outfit', size:11 }, usePointStyle:true, pointStyleWidth:8 } }
  },
  scales: {
    x: { ticks:{ color:'#8b949e', font:{family:'DM Mono',size:10} }, grid:{ color:'rgba(48,54,61,0.6)' } },
    y: { ticks:{ color:'#8b949e', font:{family:'DM Mono',size:10} }, grid:{ color:'rgba(48,54,61,0.6)' } }

function getVisitSeries(visits, key) {
  const sorted = [...visits].sort((a,b)=>a.date.localeCompare(b.date));
  return {
    labels: sorted.map(v => fmtDateShort(v.date)),
    values: sorted.map(v => (v.labs&&v.labs[key]!=null) ? v.labs[key] : null),
    pointStyles: sorted.map(v => v.visitType==='clinical' ? 'circle' : 'rectRot'),
    pointRadius: sorted.map(v => v.labs&&v.labs[key]!=null ? (v.visitType==='clinical'?5:4) : 0),
    dates: sorted.map(v=>v.date)
  };
}

function medMarkerPlugin(chartId) {
  return {
    id: 'medMarker_'+chartId,
    afterDraw(chart) {
      const { ctx, chartArea, scales, data } = chart;
      if (!chartArea) return;
      MED_EVENTS.forEach(ev => {
        const idx = data.labels?.findIndex(l => {
          // find closest label
          const evDate = new Date(ev.date+'T00:00:00');
          const evLabel = fmtDateShort(ev.date);
          return l === evLabel;
        });
        if (idx === -1 || idx == null) return;
        try {
          const x = scales.x.getPixelForValue(idx);
          ctx.save();
          ctx.strokeStyle = 'rgba(255,215,0,0.8)';
          ctx.lineWidth = 1.5;
          ctx.setLineDash([5,4]);
          ctx.beginPath();
          ctx.moveTo(x, chartArea.top);
          ctx.lineTo(x, chartArea.bottom);
          ctx.stroke();
          ctx.fillStyle = 'rgba(255,215,0,0.9)';
          ctx.font = '600 9px Outfit, sans-serif';
          ctx.fillText('💊 Meds', x+3, chartArea.top+12);
          ctx.restore();
        } catch(e){}
      });
    }
  };
}

}

function openMedModal(medId) {
  const med = medId ? appData.medications.find(m=>m.id===medId) : null;
  const html = `<div class="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <div class="modal-header">
        <h2>${med?'Edit':'Add'} Medication</h2>
        <button class="modal-close" onclick="closeModal()">×</button>
      </div>
      <div class="modal-body">
        <div class="form-row">
          <div class="form-group">
            <label>Medication Name</label>
            <input type="text" id="mName" value="${med?.name||''}" placeholder="Rosuvastatin Calcium">
          </div>
          <div class="form-group">
            <label>Dose</label>
            <input type="text" id="mDose" value="${med?.dose||''}" placeholder="10mg">
          </div>
        </div>
        <div class="form-row">

            <label>Frequency</label>
            <input type="text" id="mFreq" value="${med?.frequency||''}" placeholder="Daily">
          </div>
          <div class="form-group">
            <label>Status</label>
            <select id="mActive">
              <option value="true" ${!med||med.active?'selected':''}>Active</option>
              <option value="false" ${med&&!med.active?'selected':''}>Stopped</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label>Indication</label>
          <input type="text" id="mIndication" value="${med?.indication||''}" placeholder="Hypercholesterolemia (E78.00)">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Start Date</label>
            <input type="date" id="mStart" value="${med?.startDate||''}">
          </div>
          <div class="form-group">
            <label>Stop Date</label>
            <input type="date" id="mStop" value="${med?.stopDate||''}">
          </div>
        </div>
        <div class="form-group">
          <label>Notes</label>
          <textarea id="mNotes">${med?.notes||''}</textarea>
        </div>
      </div>
      <div class="modal-footer">

      </div>

}

function editMed(id) { openMedModal(id); }
function saveMed(id) {
  const data = {
    name: document.getElementById('mName').value,
    dose: document.getElementById('mDose').value,
    frequency: document.getElementById('mFreq').value,
    indication: document.getElementById('mIndication').value,
    startDate: document.getElementById('mStart').value,
    stopDate: document.getElementById('mStop').value || null,
    active: document.getElementById('mActive').value === 'true',
    notes: document.getElementById('mNotes').value
  };
  if (!data.name) return;
  if (id) {
    const i = appData.medications.findIndex(m=>m.id===id);
    if (i>-1) appData.medications[i] = { ...appData.medications[i], ...data };
  } else {
    appData.medications.push({ id:uid(), ...data });
  }
  saveState(); closeModal(); renderMeds();
}
function deleteMed(id) {
  if (!confirm('Remove this medication?')) return;
  appData.medications = appData.medications.filter(m=>m.id!==id);
  saveState(); closeModal(); renderMeds();
}
function closeModal() { document.getElementById('modalContainer').innerHTML = ''; }

// ═══════════════════════════════════════════════════════
// VITALS & WEIGHT
// ═══════════════════════════════════════════════════════
function renderVitals() {
  const wts = [...appData.weightLog].sort((a,b)=>b.date.localeCompare(a.date));
  const pane = document.getElementById('pane-vitals');
  pane.innerHTML = `
    <div class="section-header">
      <div class="section-title">Vitals & Weight Log</div>
      <button class="btn btn-accent btn-sm" onclick="openWeightModal()">+ Add Entry</button>
    </div>
    <div class="weight-quick-card" style="margin-bottom:14px">
      <div class="card-title" style="margin-bottom:8px">Weight History</div>
      <div style="display:flex;align-items:baseline;gap:8px">
        <span class="weight-current" style="font-size:36px">${wts[0]?.weight??'—'}</span>
        <span class="weight-current-unit">lbs</span>
        <span class="weight-bmi">BMI ${wts[0]?.bmi??'—'}</span>
      </div>
      <div style="margin-top:10px;height:80px"><canvas id="miniWeightChart"></canvas></div>
    </div>
    <div class="card">
      <table class="weight-log-table">
        <thead><tr><th>Date</th><th>Weight</th><th>BMI</th><th>Notes</th><th></th></tr></thead>
        <tbody>
          ${wts.map(w=>`
            <tr>
              <td>${fmtDate(w.date)}</td>
              <td>${w.weight} lbs</td>
              <td>${w.bmi}</td>
              <td style="color:var(--muted);font-size:12px">${w.notes||''}</td>
              <td><button class="btn btn-outline btn-sm" onclick="deleteWeight('${w.id}')">×</button></td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  `;
  requestAnimationFrame(() => {
    const sorted = [...wts].reverse();
    const ctx = document.getElementById('miniWeightChart')?.getContext('2d');
    if (!ctx) return;
    if (chartInstances.miniWeight) { try{chartInstances.miniWeight.destroy();}catch(e){} }
    chartInstances.miniWeight = new Chart(ctx, {
      type:'line',
      data:{ labels:sorted.map(w=>fmtDateShort(w.date)), datasets:[{
        data:sorted.map(w=>w.weight), borderColor:'#00b4d8', backgroundColor:'rgba(0,180,216,0.08)',
        tension:0.4, pointRadius:3, fill:true
      }]},
      options:{ responsive:true, maintainAspectRatio:false,
        plugins:{ legend:{display:false} },
        scales:{ x:{ticks:{color:'#484f58',font:{size:9}},grid:{color:'rgba(48,54,61,0.4)'}}, y:{ticks:{color:'#484f58',font:{size:9}},grid:{color:'rgba(48,54,61,0.4)'}} }
      }
    });
  });
}

function openWeightModal() {
  const html = `<div class="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <div class="modal-header"><h2>Add Weight Entry</h2><button class="modal-close" onclick="closeModal()">×</button></div>
      <div class="modal-body">
        <div class="form-row">
          <div class="form-group"><label>Date</label><input type="date" id="wDate" value="${new Date().toISOString().slice(0,10)}"></div>
          <div class="form-group"><label>Weight (lbs)</label><input type="number" id="wWeight" step="0.1" placeholder="159.4"></div>
        </div>
        <div class="form-group"><label>Notes</label><input type="text" id="wNotes" placeholder="Optional"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
        <button class="btn btn-accent" onclick="saveWeightEntry()">Save</button>
      </div>
    </div>
  </div>`;
  document.getElementById('modalContainer').innerHTML = html;
}
function saveWeightEntry() {
  const d = document.getElementById('wDate').value;
  const w = parseFloat(document.getElementById('wWeight').value);
  if (!d||isNaN(w)) return;
  const h = appData.settings.heightIn||67;
  appData.weightLog.push({ id:uid(), date:d, weight:w, bmi:parseFloat(calcBMI(w,h).toFixed(2)), notes:document.getElementById('wNotes').value });
  appData.weightLog.sort((a,b)=>a.date.localeCompare(b.date));
  saveState(); closeModal(); renderVitals();
}
function deleteWeight(id) {
  appData.weightLog = appData.weightLog.filter(w=>w.id!==id);
  saveState(); renderVitals();
}

function saveSettings() {
  appData.settings.provider = document.getElementById('sProvider').value;
  appData.settings.facility = document.getElementById('sFacility').value;
  appData.settings.dob = document.getElementById('sDob').value;
  appData.settings.heightIn = parseFloat(document.getElementById('sHeight').value)||67;
  saveState();
  showToast('Settings saved');
}

function exportData() {
  const blob = new Blob([JSON.stringify(appData, null, 2)], { type:'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `health_tracker_export_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
}

function changePassword() {
  const np = prompt('Enter new password:');
  if (!np) return;
  sha256(np).then(h => { localStorage.setItem(PW_KEY, h); showToast('Password updated'); });
}

function resetData() {
  if (!confirm('This will reset all data to the original seeded dataset. Are you sure?')) return;
  appData = getSeedData();
  saveState();
  renderTab(activeTab);
  showToast('Data reset to seed');
}

// Toast
function showToast(msg) {
  const t = document.createElement('div');
  t.style.cssText = 'position:fixed;bottom:20px;right:20px;background:#161b22;border:1px solid #30363d;color:#e6edf3;padding:10px 16px;border-radius:8px;font-size:13px;z-index:9999;opacity:0;transition:opacity .2s';
  t.textContent = msg;
  document.body.appendChild(t);
  requestAnimationFrame(() => { t.style.opacity='1'; });
  setTimeout(() => { t.style.opacity='0'; setTimeout(()=>t.remove(),300); }, 2500);
}

// ═══════════════════════════════════════════════════════
// GOOGLE DRIVE
// ═══════════════════════════════════════════════════════
function initDrive() {
  if (appData.settings.driveEnabled) updateDriveUI(true);
}

function handleDriveClick() {
  if (!driveToken) {
    gapi.load('client', async () => {
      await gapi.client.init({ discoveryDocs:['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest'] });
      tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: CLIENT_ID,
        scope: DRIVE_SCOPE,
        callback: async (resp) => {
          if (resp.error) { console.error(resp); return; }
          driveToken = resp.access_token;
          appData.settings.driveEnabled = true;
          updateDriveUI(true);
          await loadFromDrive();
        }
      });
      tokenClient.requestAccessToken();
    });
  } else {
    saveToDrive();
  }
}

function updateDriveUI(connected) {
  const dot = document.getElementById('driveDot');
  const label = document.getElementById('driveLabel');
  if (dot) dot.className = 'drive-dot' + (connected ? ' connected' : '');
  if (label) label.textContent = connected ? 'Drive Connected' : 'Drive Sync';
}

async function getDriveFileId() {
  if (driveFileId) return driveFileId;
  const res = await gapi.client.drive.files.list({
    spaces:'appDataFolder', fields:'files(id,name)', q:`name='${DRIVE_FILE}'`
  });
  const files = res.result.files;
  if (files && files.length > 0) { driveFileId = files[0].id; return driveFileId; }
  return null;
}

async function saveToDrive() {
  if (!driveToken) { handleDriveClick(); return; }
  try {
    const content = JSON.stringify(appData);
    const fileId = await getDriveFileId();
    if (fileId) {
      await gapi.client.request({ path:`/upload/drive/v3/files/${fileId}`, method:'PATCH',
        params:{ uploadType:'media' }, body:content });
    } else {
      const meta = await gapi.client.drive.files.create({
        resource:{ name:DRIVE_FILE, parents:['appDataFolder'] }, fields:'id'
      });
      driveFileId = meta.result.id;
      await gapi.client.request({ path:`/upload/drive/v3/files/${driveFileId}`, method:'PATCH',
        params:{ uploadType:'media' }, body:content });
    }
    appData.settings.lastSync = new Date().toISOString();
    saveState();
    showToast('Saved to Drive ✓');
  } catch(e) { console.error(e); showToast('Drive save failed'); }
}

async function loadFromDrive() {
  if (!driveToken) return;
  try {
    const fileId = await getDriveFileId();
    if (!fileId) { await saveToDrive(); return; }
    const res = await gapi.client.drive.files.get({ fileId, alt:'media' });
    if (res.body) {
      const remote = JSON.parse(res.body);
      if (remote.labVisits) { appData = remote; saveState(); renderTab(activeTab); showToast('Loaded from Drive ✓'); }
    }
  } catch(e) { console.error(e); }
}
</script>
